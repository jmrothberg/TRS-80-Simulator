<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids 1979 - Vector Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* Pure Black */
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            border: 2px solid #333;
        }

        canvas {
            display: block;
            background-color: #000000;
            cursor: crosshair;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px #fff;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border: 2px solid #fff;
            pointer-events: auto;
        }

        h1 {
            font-size: 60px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 4px 4px 0px #333;
        }

        p { font-size: 18px; line-height: 1.6; }
        
        .hidden { display: none !important; }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 24px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }
        button:hover { background: #ccc; }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-layer">
        <div class="hud-top">
            <div id="score-display">SCORE: 00000</div>
            <div id="lives-display">LIVES: 3</div>
        </div>
    </div>

    <div id="start-screen">
        <h1>Asteroids</h1>
        <p>Destroy asteroids and UFOs to survive.</p>
        <p><strong>Controls:</strong></p>
        <p>UP / W : Thrust</p>
        <p>LEFT / RIGHT : Rotate</p>
        <p>SPACE : Shoot</p>
        <button id="start-btn">Insert Coin (Start)</button>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1>GAME OVER</h1>
        <p id="final-score">Score: 0</p>
        <button id="restart-btn">Play Again</button>
    </div>
</div>

<script>
/**
 * ASTEROIDS (1979) RECREATION
 */

// --- CONFIGURATION ---
const SHIP_THRUST = 0.15;
const SHIP_TURN_SPEED = 360; 
const BULLET_SPEED = 500;
const BULLET_LIFETIME = 0.8; 
const ASTEROID_SPEED = 50;
const UFO_SPEED_LARGE = 120;
const UFO_SPEED_SMALL = 250;

// --- AUDIO SYSTEM (Web Audio API) ---
const AudioSys = {
    ctx: null,
    init: function() {
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
    },
    playTone: function(freq, type, duration, vol = 0.1) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },
    playNoise: function(duration) {
        if (!this.ctx) return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        
        noise.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
    },
    shoot: function() { this.playTone(880, 'square', 0.15, 0.05); }, 
    thrust: function() { 
        if (!this.ctx) return;
        const bufferSize = this.ctx.sampleRate * 0.1;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const gain = this.ctx.createGain();
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 400;

        gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
    },
    explode: function() { this.playNoise(0.4); },
    bigUfo: function() { 
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 1.5);
        gain.gain.value = 0.05;
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 1.5);
    },
    smallUfo: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(1200, this.ctx.currentTime + 0.5);
        gain.gain.value = 0.05;
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.5);
    }
};

// --- MATH HELPERS ---
const MathUtils = {
    degToRad: (deg) => deg * (Math.PI / 180),
    randomRange: (min, max) => Math.random() * (max - min) + min,
    dist: (x1, y1, x2, y2) => Math.sqrt((x2-x1)**2 + (y2-y1)**2)
};

// --- GAME CLASSES ---

class GameObject {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.radius = 0;
        this.angle = 0;
        this.dead = false;
        this.rotationSpeed = 0;
    }

    update(dt, canvasWidth, canvasHeight) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.angle += this.rotationSpeed * dt;

        // Screen Wrap
        if (this.x < 0 - this.radius) this.x = canvasWidth + this.radius;
        if (this.x > canvasWidth + this.radius) this.x = 0 - this.radius;
        if (this.y < 0 - this.radius) this.y = canvasHeight + this.radius;
        if (this.y > canvasHeight + this.radius) this.y = 0 - this.radius;
    }

    draw(ctx) { /* Override */ }
}

class Ship extends GameObject {
    constructor(x, y) {
        super(x, y);
        this.radius = 15; 
        this.angle = -Math.PI / 2; 
        this.thrusting = false;
        this.invincible = true;
        this.invincibleTime = 3.0;
        this.blinkState = true;
    }

    update(dt, canvasWidth, canvasHeight) {
        super.update(dt, canvasWidth, canvasHeight);

        if (this.invincible) {
            this.invincibleTime -= dt;
            if (this.invincibleTime <= 0) {
                this.invincible = false;
            }
            this.blinkState = Math.floor(this.invincibleTime * 10) % 2 === 0;
        } else {
            this.blinkState = true;
        }

        if (this.thrusting) {
            this.vx += Math.cos(this.angle) * SHIP_THRUST;
            this.vy += Math.sin(this.angle) * SHIP_THRUST;
            
            const speed = Math.sqrt(this.vx**2 + this.vy**2);
            if (speed > 400) {
                this.vx *= 0.98;
                this.vy *= 0.98;
            }
        } else {
            this.vx *= 0.995;
            this.vy *= 0.995;
        }
    }

    draw(ctx) {
        if (!this.blinkState) return;

        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        // Draw Ship
        ctx.beginPath();
        ctx.moveTo(15, 0);   
        ctx.lineTo(-10, 10); 
        ctx.lineTo(-5, 0);   
        ctx.lineTo(-10, -10);
        ctx.closePath();
        ctx.stroke();

        // Draw Thrust Flame
        if (this.thrusting) {
            ctx.strokeStyle = '#FF4400'; 
            ctx.lineWidth = 2;
            ctx.beginPath();
            const flicker = Math.sin(Date.now() / 20) * 5 + 10; 
            ctx.moveTo(-5, 0);
            ctx.lineTo(-15 - (flicker/2), 0); 
            ctx.lineTo(-10 - flicker, 4);     
            ctx.lineTo(-15 - (flicker/2), 0);
            ctx.stroke();
            
            ctx.strokeStyle = '#FFFF00';
            ctx.beginPath();
            ctx.moveTo(-5, 0);
            ctx.lineTo(-12 - flicker, -3);
            ctx.lineTo(-18 - flicker * 1.5, 0);
            ctx.stroke();
        }

        ctx.restore();
    }
}

class Asteroid extends GameObject {
    constructor(x, y, sizeLevel) {
        super(x, y);
        this.level = sizeLevel;
        
        if (sizeLevel === 3) { this.radius = 40; this.speed = ASTEROID_SPEED * 0.8; }
        else if (sizeLevel === 2) { this.radius = 25; this.speed = ASTEROID_SPEED * 1.2; }
        else { this.radius = 12; this.speed = ASTEROID_SPEED * 1.8; }

        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * this.speed;
        this.vy = Math.sin(angle) * this.speed;
        this.rotationSpeed = MathUtils.randomRange(-2, 2);

        this.vertices = [];
        const numVertices = sizeLevel === 3 ? 9 : (sizeLevel === 2 ? 7 : 5);
        for (let i = 0; i < numVertices; i++) {
            const theta = (i / numVertices) * Math.PI * 2;
            const rVar = this.radius * MathUtils.randomRange(0.7, 1.3);
            this.vertices.push({
                x: Math.cos(theta) * rVar,
                y: Math.sin(theta) * rVar
            });
        }
    }

    draw(ctx) {
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        ctx.beginPath();
        if (this.vertices.length > 0) {
            ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
            for (let i = 1; i < this.vertices.length; i++) {
                ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
            }
        }
        ctx.closePath();
        ctx.stroke();

        if (this.level === 3) {
            ctx.beginPath();
            ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
            ctx.lineTo(this.vertices[4].x, this.vertices[4].y);
            ctx.stroke();
        }

        ctx.restore();
    }
}

class Bullet extends GameObject {
    constructor(x, y, angle) {
        super(x, y);
        this.vx = Math.cos(angle) * BULLET_SPEED;
        this.vy = Math.sin(angle) * BULLET_SPEED;
        this.lifeTime = BULLET_LIFETIME;
        this.radius = 2;
        this.isEnemy = false; // Default to player bullet
    }

    update(dt, canvasWidth, canvasHeight) {
        super.update(dt, canvasWidth, canvasHeight);
        this.lifeTime -= dt;
        if (this.lifeTime <= 0) this.dead = true;
    }

    draw(ctx) {
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

class UFO extends GameObject {
    constructor(canvasWidth, canvasHeight, type) {
        super(0, 0);
        this.type = type;
        this.direction = Math.random() > 0.5 ? 1 : -1; 
        
        if (type === 'large') {
            this.radius = 25;
            this.speed = UFO_SPEED_LARGE;
            this.scoreValue = 100;
            AudioSys.bigUfo();
        } else {
            this.radius = 12;
            this.speed = UFO_SPEED_SMALL;
            this.scoreValue = 500;
            AudioSys.smallUfo();
        }

        if (this.direction === 1) {
            this.x = -this.radius * 3;
            this.angle = 0;
        } else {
            this.x = canvasWidth + this.radius * 3;
            this.angle = Math.PI;
        }
        
        this.y = MathUtils.randomRange(50, canvasHeight - 50);
        
        this.vx = Math.cos(this.angle) * this.speed;
        this.vy = Math.sin(this.angle) * this.speed;
        
        this.shootTimer = 0;
        // Small UFO shoots more frequently
        this.shootInterval = type === 'large' ? MathUtils.randomRange(2.5, 4) : MathUtils.randomRange(0.8, 1.5);
    }

    update(dt, canvasWidth, canvasHeight, player) {
        super.update(dt, canvasWidth, canvasHeight);

        if (this.type === 'large') {
            this.y += Math.sin(Date.now() / 1000) * 20;
        }

        this.shootTimer -= dt;
        if (this.shootTimer <= 0 && !player.dead) {
            this.shoot(player);
            this.shootTimer = this.shootInterval;
        }
    }

    shoot(player) {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        let angle = Math.atan2(dy, dx);

        if (this.type === 'large') {
            angle += MathUtils.randomRange(-0.5, 0.5);
        }

        // Create enemy bullet
        const b = new Bullet(this.x, this.y, angle);
        b.vx += Math.cos(angle) * 200; 
        b.vy += Math.sin(angle) * 200;
        b.isEnemy = true;
        
        // FIX: Use 'Game' (capital G) to match the global object name
        Game.bullets.push(b);
    }

    draw(ctx) {
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 2;
        
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.direction === -1) ctx.rotate(Math.PI);

        ctx.beginPath();
        
        if (this.type === 'large') {
            ctx.ellipse(0, -5, 10, 5, 0, 0, Math.PI * 2);
            ctx.ellipse(0, 5, 18, 8, 0, 0, Math.PI * 2);
            ctx.moveTo(-10, 0);
            ctx.lineTo(10, 0);
            ctx.moveTo(-15, 6);
            ctx.lineTo(-10, 8);
            ctx.moveTo(15, 6);
            ctx.lineTo(10, 8);
        } else {
            ctx.moveTo(-10, -5);
            ctx.lineTo(5, -5);
            ctx.lineTo(10, 0);
            ctx.lineTo(5, 5);
            ctx.lineTo(-10, 5);
            ctx.closePath();
            ctx.moveTo(-5, 0);
            ctx.lineTo(5, 0);
        }
        
        ctx.stroke();
        ctx.restore();
    }
}

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 100 + 50;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 0.5;
        this.radius = Math.random() * 2 + 1;
    }
    
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt;
    }
    
    draw(ctx) {
        ctx.fillStyle = `rgba(255, 255, 255, ${this.life / 0.5})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fill();
    }
}

// --- MAIN GAME ENGINE ---
const Game = {
    canvas: document.getElementById('gameCanvas'),
    ctx: document.getElementById('gameCanvas').getContext('2d'),
    
    state: 'MENU', 
    lastTime: 0,
    score: 0,
    lives: 3,
    level: 1,
    
    ship: null,
    asteroids: [],
    bullets: [],
    ufos: [],
    particles: [],
    keys: {},

    init: function() {
        this.setupInputs();
        
        document.getElementById('start-btn').addEventListener('click', () => {
            AudioSys.init();
            this.startGame();
        });
        
        document.getElementById('restart-btn').addEventListener('click', () => {
            this.startGame();
        });

        requestAnimationFrame((ts) => this.loop(ts));
    },

    setupInputs: function() {
        window.addEventListener('keydown', (e) => {
            this.keys[e.code] = true;
            
            if (this.state === 'PLAYING' && e.code === 'Space') {
                this.shipShoot();
            }
        });
        
        window.addEventListener('keyup', (e) => {
            this.keys[e.code] = false;
        });
    },

    startGame: function() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        
        this.score = 0;
        this.lives = 3;
        this.level = 1;
        this.updateUI();
        
        this.startLevel();
        this.state = 'PLAYING';
    },

    startLevel: function() {
        this.ship = new Ship(this.canvas.width / 2, this.canvas.height / 2);
        this.bullets = [];
        this.ufos = [];
        this.particles = [];
        
        this.asteroids = [];
        const numAsteroids = 3 + this.level; 
        for(let i=0; i<numAsteroids; i++) {
            this.spawnAsteroid();
        }
    },

    spawnAsteroid: function(x, y) {
        let ax, ay;
        if (x === undefined || y === undefined) {
            if (Math.random() < 0.5) {
                ax = Math.random() < 0.5 ? -40 : this.canvas.width + 40;
                ay = Math.random() * this.canvas.height;
            } else {
                ax = Math.random() * this.canvas.width;
                ay = Math.random() < 0.5 ? -40 : this.canvas.height + 40;
            }
        } else {
            ax = x;
            ay = y;
        }
        
        if (MathUtils.dist(ax, ay, this.ship.x, this.ship.y) < 150) {
            ax += 200; 
        }

        this.asteroids.push(new Asteroid(ax, ay, 3));
    },

    shipShoot: function() {
        if (this.ship.dead) return;
        
        const bx = this.ship.x + Math.cos(this.ship.angle) * 15;
        const by = this.ship.y + Math.sin(this.ship.angle) * 15;
        
        this.bullets.push(new Bullet(bx, by, this.ship.angle));
        AudioSys.shoot();
    },

    createExplosion: function(x, y, size) {
        const count = size === 'large' ? 20 : (size === 'medium' ? 10 : 5);
        for(let i=0; i<count; i++) {
            this.particles.push(new Particle(x, y));
        }
        AudioSys.explode();
    },

    update: function(dt) {
        if (this.state !== 'PLAYING') return;

        // --- Ship Logic ---
        if (!this.ship.dead) {
            this.ship.thrusting = false;
            
            if (this.keys['ArrowUp'] || this.keys['KeyW']) {
                this.ship.thrusting = true;
                if (Math.random() > 0.7) AudioSys.thrust(); 
            }
            
            const turnSpeed = SHIP_TURN_SPEED * dt / 180 * Math.PI;
            if (this.keys['ArrowLeft'] || this.keys['KeyA']) {
                this.ship.angle -= turnSpeed;
            }
            if (this.keys['ArrowRight'] || this.keys['KeyD']) {
                this.ship.angle += turnSpeed;
            }

            this.ship.update(dt, this.canvas.width, this.canvas.height);
        }

        // --- Asteroids Logic ---
        this.asteroids.forEach(a => a.update(dt, this.canvas.width, this.canvas.height));

        // --- Bullets Logic (Player & Enemy) ---
        this.bullets.forEach(b => b.update(dt, this.canvas.width, this.canvas.height));
        
        // --- UFO Logic (Spawn Chance) ---
        if (this.ufos.length === 0 && Math.random() < 0.0015 * this.level) {
            const type = Math.random() > 0.8 ? 'small' : 'large';
            this.ufos.push(new UFO(this.canvas.width, this.canvas.height, type));
        }
        
        this.ufos.forEach(u => u.update(dt, this.canvas.width, this.canvas.height, this.ship));

        // --- Particles Logic ---
        this.particles.forEach(p => p.update(dt));
        this.particles = this.particles.filter(p => p.life > 0);

        // --- Collision Detection ---

        // 1. Player Bullets vs Asteroids
        for (let i = this.bullets.length - 1; i >= 0; i--) {
            const b = this.bullets[i];
            if (b.dead || b.isEnemy) continue;

            for (let j = this.asteroids.length - 1; j >= 0; j--) {
                const a = this.asteroids[j];
                if (MathUtils.dist(b.x, b.y, a.x, a.y) < a.radius + b.radius) {
                    b.dead = true;
                    a.dead = true;
                    
                    let points = 0;
                    if (a.level === 3) { this.score += 20; points = 20; }
                    else if (a.level === 2) { this.score += 50; points = 50; }
                    else { this.score += 100; points = 100; }
                    
                    if (this.score > 0 && this.score % 10000 === 0) {
                        this.lives++;
                        AudioSys.playTone(600, 'square', 0.2);
                        setTimeout(() => AudioSys.playTone(800, 'square', 0.4), 200);
                    }
                    this.updateUI();

                    if (a.level > 1) {
                        this.asteroids.push(new Asteroid(a.x, a.y, a.level - 1));
                        this.asteroids.push(new Asteroid(a.x, a.y, a.level - 1));
                    }
                    
                    this.createExplosion(a.x, a.y, points >= 50 ? 'medium' : 'small');
                    break; 
                }
            }
        }

        // 2. Player Bullets vs UFOs
        for (let i = this.bullets.length - 1; i >= 0; i--) {
            const b = this.bullets[i];
            if (b.dead || b.isEnemy) continue;

            for (let j = this.ufos.length - 1; j >= 0; j--) {
                const u = this.ufos[j];
                if (MathUtils.dist(b.x, b.y, u.x, u.y) < u.radius + b.radius) {
                    b.dead = true;
                    u.dead = true;
                    
                    this.score += u.scoreValue;
                    if (this.score > 0 && this.score % 10000 === 0) {
                        this.lives++;
                        AudioSys.playTone(600, 'square', 0.2);
                        setTimeout(() => AudioSys.playTone(800, 'square', 0.4), 200);
                    }
                    this.updateUI();
                    
                    const size = u.type === 'large' ? 'large' : 'medium';
                    this.createExplosion(u.x, u.y, size);
                    break;
                }
            }
        }

        // 3. Enemy Bullets vs Ship
        if (!this.ship.dead && !this.ship.invincible) {
            for (let b of this.bullets) {
                if (b.isEnemy && MathUtils.dist(this.ship.x, this.ship.y, b.x, b.y) < this.ship.radius + b.radius) {
                    this.shipDie();
                    b.dead = true;
                    break;
                }
            }
        }

        // 4. Ship vs Asteroids
        if (!this.ship.dead && !this.ship.invincible) {
            for (let a of this.asteroids) {
                if (MathUtils.dist(this.ship.x, this.ship.y, a.x, a.y) < this.ship.radius + a.radius) {
                    this.shipDie();
                    break;
                }
            }
        }

        // 5. Ship vs UFOs
        if (!this.ship.dead && !this.ship.invincible) {
            for (let u of this.ufos) {
                if (MathUtils.dist(this.ship.x, this.ship.y, u.x, u.y) < this.ship.radius + u.radius) {
                    this.shipDie();
                    u.dead = true;
                    this.createExplosion(u.x, u.y, 'large');
                    break;
                }
            }
        }

        // Cleanup Dead Objects
        this.bullets = this.bullets.filter(b => !b.dead);
        this.asteroids = this.asteroids.filter(a => !a.dead);
        this.ufos = this.ufos.filter(u => !u.dead);

        // Level Clear Check
        if (this.asteroids.length === 0 && this.ufos.length === 0) {
            this.level++;
            setTimeout(() => this.startLevel(), 1000);
        }
    },

    shipDie: function() {
        this.createExplosion(this.ship.x, this.ship.y, 'large');
        this.lives--;
        this.updateUI();
        
        if (this.lives <= 0) {
            this.ship.dead = true;
            this.state = 'GAMEOVER';
            document.getElementById('final-score').innerText = "Final Score: " + this.score;
            document.getElementById('game-over-screen').classList.remove('hidden');
        } else {
            this.ship = new Ship(this.canvas.width / 2, this.canvas.height / 2);
            this.ship.invincible = true;
            this.ship.invincibleTime = 3.0;
        }
    },

    updateUI: function() {
        document.getElementById('score-display').innerText = "SCORE: " + this.score.toString().padStart(5, '0');
        document.getElementById('lives-display').innerText = "LIVES: " + this.lives;
    },

    draw: function() {
        this.ctx.fillStyle = '#000000';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        if (this.state === 'MENU') return;

        this.asteroids.forEach(a => a.draw(this.ctx));
        this.bullets.forEach(b => b.draw(this.ctx));
        this.ufos.forEach(u => u.draw(this.ctx));
        this.particles.forEach(p => p.draw(this.ctx));

        if (this.state === 'PLAYING' && !this.ship.dead) {
            this.ship.draw(this.ctx);
        }
    },

    loop: function(timestamp) {
        const dt = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;

        if (dt < 0.1) {
            this.update(dt);
            this.draw();
        }

        requestAnimationFrame((ts) => this.loop(ts));
    }
};

// Start the engine
Game.init();

</script>
