<script>
// ===================================================================
//  TRS-80 Model I Level II BASIC Simulator — Web Edition
//  Ported from TRS80_March_22_26.py by Jonathan Rothberg (JMR)
// ===================================================================

// -- Comparison wrappers for TRS-80 semantics (TRUE = -1, FALSE = 0) --
function _gt(a, b) { return a > b ? -1 : 0; }
function _lt(a, b) { return a < b ? -1 : 0; }
function _ge(a, b) { return a >= b ? -1 : 0; }
function _le(a, b) { return a <= b ? -1 : 0; }
function _eq(a, b) { return a == b ? -1 : 0; }
function _ne(a, b) { return a != b ? -1 : 0; }
function _bnot(a)   { return ~Math.trunc(a); }

const PIXEL_SIZE = 6;
const SCREEN_W = 768;   // 128 * 6
const SCREEN_H = 288;   // 48  * 6
const COLS = 64;
const ROWS = 16;

const KEYWORD_REPLACEMENTS = {
    'MOD': ' % ',
    'OR':  ' | ',
    'AND': ' & ',
    'NOT': ' not ',
    '<>':  '!=',
    '=':   '==',
    '^':   '**',
};

// ===================================================================
//  TRS80Simulator class
// ===================================================================
class TRS80Simulator {

// ------------------------------------------------------------------
//  Constructor — mirrors Python __init__
// ------------------------------------------------------------------
constructor() {
    this.canvas = document.getElementById('screen');
    this.ctx    = this.canvas.getContext('2d');
    this.inputArea  = document.getElementById('inputArea');
    this.debugText  = document.getElementById('debugText');
    this.debugPanel = document.getElementById('debugPanel');
    this.variablesText  = document.getElementById('variablesText');
    this.variablesPanel = document.getElementById('variablesPanel');
    this.variablesWindowOpen = false;

    this.pixelSize = PIXEL_SIZE;
    this.charW = PIXEL_SIZE * 2;   // 12
    this.charH = PIXEL_SIZE * 3;   // 18
    this.screenFont = "16px 'Courier New', monospace";

    // Screen state
    this.screenContent = [];
    this.pixelMatrix   = [];
    this.activePixels  = new Set();
    this.cursorRow = 0;
    this.cursorCol = 0;
    this.cursorVisible = true;
    this._lastCursorRow = undefined;
    this._lastCursorCol = undefined;

    // Interpreter state
    this.scalarVariables = {};
    this.arrayVariables  = {};
    // TRS-80 DIM A(I,J): name -> [maxDim1, maxDim2] for linear indexing
    this.arrayDimensions = {};
    this.userFunctions   = {};
    this._lastRnd        = 0;
    this.forLoops        = {};
    this.gosubStack      = [];
    this.dataValues      = [];
    this.dataPointer     = 0;
    this.currentLineIndex = 0;
    this.programRunning  = false;
    this.programPaused   = false;
    this.waitingForInput = false;
    this.inputVariables  = null;
    this.lastKeyPressed  = null;
    this.lastKeyTime     = 0;
    this.keyCheckInterval = 0.05;
    this.stepping        = false;
    this.immediateMode   = true;
    this.commandBuffer   = '';
    this.storedProgram   = [];
    this.sortedProgram   = [];
    this.originalProgram = [];
    this.debugMode       = false;

    this._lineNumbers   = [];
    this._lineCommands  = [];
    this._lineCmdWords  = [];
    this._usesInkey     = false;

    this._sortedVarsCache = [];
    this._lastVarCount    = 0;
    this._arrayPatterns   = {};
    this._varRegexCache   = {};

    this._pendingGraphics = [];
    this._lastDebugCommand    = '';
    this._lastEvalOriginal    = '';
    this._lastEvalSubstituted = '';

    this.tapeData       = [];
    this.tapePointer    = 0;
    this.waitingForTape = false;  // true when program paused waiting for tape INSERT

    // Input handling state
    this.inputStartRow = 0;
    this.inputStartCol = 0;

    this.replaced = false;

    // Compile regex patterns
    this._compileRegexPatterns();
    this._initCommandHandlers();
    this._initBuiltinFunctions();

    // Init screen arrays
    this._resetScreenArrays();
    this.clearScreen();

    // Wire up buttons
    this._wireButtons();

    // Keyboard handling on canvas
    this.canvas.addEventListener('keydown', (e) => this._handleKeyDown(e));

    // Mobile/tablet virtual keyboard support
    this._mobileInput = document.getElementById('mobileKeyInput');
    this._isMobile = /iPad|iPhone|iPod|Android/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1);
    this._mobileInput.addEventListener('input', (e) => {
        const val = this._mobileInput.value;
        if (val.length > 0) {
            // Process each new character as a keydown
            for (const ch of val) {
                this._handleKeyDown({ key: ch, preventDefault: () => {} });
            }
            this._mobileInput.value = '';
        }
    });
    this._mobileInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === 'Backspace' || e.key === 'Escape') {
            this._handleKeyDown(e);
        }
    });

    // Focus handler: on mobile, focus the hidden input to raise keyboard
    this.canvas.addEventListener('click', () => this._focusForInput());
    this.canvas.addEventListener('touchend', (e) => { e.preventDefault(); this._focusForInput(); });

    // Auto-capitalize input area
    this.inputArea.addEventListener('input', () => {
        const pos = this.inputArea.selectionStart;
        this.inputArea.value = this.inputArea.value.toUpperCase();
        this.inputArea.selectionStart = this.inputArea.selectionEnd = pos;
    });

    // Start cursor blink
    this._cursorTimer = setInterval(() => this._blinkCursor(), 500);

    // Enable immediate mode
    this.enableImmediateMode();
}

// ------------------------------------------------------------------
//  Regex compilation — mirrors _compile_regex_patterns
// ------------------------------------------------------------------
_compileRegexPatterns() {
    this._re = {};
    this._re.arrayMatch   = /^(\w+\$?)\((.+)\)$/;
    this._re.printAt      = /^PRINT@\s*([^,;]+)\s*,?\s*(.*)/;
    this._re.ifThen       = /^IF\s+(.*?)\s+THEN\s+(.*?)(\s+ELSE\s+(.*))?$/;
    this._re.forLoop      = /^FOR\s+(\w+)\s*=\s*(.+?)\s+TO\s+(.+?)(\s+STEP\s+(.+))?$/;
    this._re.onGoto       = /^ON\s+(.*?)\s+GOTO\s+(.*)/;
    this._re.dim          = /^DIM\s+(\w+\$?)\((.+)\)$/;
    this._re.poke         = /^POKE\s+(.+?)\s*,\s*(.+)/;
    this._re.tab          = /TAB\((\d+)\)/;
    // ATN must be listed: otherwise ATN(x) is not reduced in _evalNested and can fall through as a string (mirrors TRS80_March_30_26.py func_match).
    this._re.funcMatch    = /(INT|SIN|COS|TAN|ATN|SQR|LOG|EXP|SGN|FIX|CHR\$|STRING\$|VAL|RND|ASC|PEEK|POINT|STR\$|LEN|LEFT\$|RIGHT\$|MID\$|ABS|INSTR)\(/;
    this._re.stringSplit  = /("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/;
    this._re.inkey        = /\bINKEY\$/;
    this._re.allKeywords  = /\bRND\b(?!\()|\bMOD\b|\bOR\b|\bAND\b|\bNOT\b|<>|(?<![=<>])=(?!=)|\^/g;
}

_resetScreenArrays() {
    this.screenContent = Array.from({length: ROWS}, () => Array(COLS).fill(' '));
    this.pixelMatrix   = Array.from({length: 48}, () => Array(128).fill(0));
    this.activePixels  = new Set();
}

// ------------------------------------------------------------------
//  Button wiring
// ------------------------------------------------------------------
_wireButtons() {
    document.getElementById('btnRun').onclick   = () => this.runProgram();
    document.getElementById('btnClear').onclick = () => this._clearVariablesBtn();
    document.getElementById('btnStop').onclick  = () => this.stopProgram();
    document.getElementById('btnStep').onclick  = () => this.stepProgram();
    document.getElementById('btnList').onclick  = () => this.listProgram();
    document.getElementById('btnNew').onclick   = () => this._newBtn();
    document.getElementById('btnSave').onclick  = () => this.saveProgram();
    document.getElementById('btnLoad').onclick  = () => this._triggerLoad();
    document.getElementById('btnTape').onclick  = () => this._triggerTapeLoad();
    document.getElementById('btnCopy').onclick  = () => this.copyScreen();
    document.getElementById('btnDebug').onclick = () => this.toggleDebug();
    document.getElementById('btnVariables').onclick = () => this.toggleVariables();
    document.getElementById('btnDebugClear').onclick = () => { this.debugText.value = ''; };
    document.getElementById('btnDebugList').onclick  = () => this._listPreprocessed();
    document.getElementById('btnHelp').onclick       = () => this._showHelp();
    document.getElementById('helpClose').onclick     = () => this._hideHelp();

    // Help tab switching
    document.getElementById('helpTabs').addEventListener('click', (e) => {
        if (e.target.dataset.tab !== undefined) {
            document.querySelectorAll('#helpTabs button').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById('helpContent').textContent = this._helpTexts[Number(e.target.dataset.tab)];
        }
    });
    // Close help on overlay background click
    document.getElementById('helpOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'helpOverlay') this._hideHelp();
    });

    document.getElementById('fileInput').addEventListener('change', (e) => this._handleFileLoad(e));
    document.getElementById('tapeInput').addEventListener('change', (e) => this._handleTapeFileLoad(e));

    // GitHub-hosted example programs and tape files
    const selExamples = document.getElementById('selExamples');
    const selTape     = document.getElementById('selTape');
    selExamples.onchange = () => this._loadFromGitHub(selExamples, 'bas');
    selTape.onchange     = () => this._loadFromGitHub(selTape, 'dat');
    this._populateGitHubDropdowns();
}

// ------------------------------------------------------------------
//  Help System
// ------------------------------------------------------------------
_showHelp() {
    document.getElementById('helpContent').textContent = this._helpTexts[0];
    document.getElementById('helpOverlay').classList.add('show');
}
_hideHelp() {
    document.getElementById('helpOverlay').classList.remove('show');
    this._focusForInput();
}

get _helpTexts() { return [
// Tab 0: Quick Start
`QUICK START
============

1. Type BASIC lines on the green screen (immediate mode)
   or paste a program into the text area below it.

2. Click RUN (or type RUN on the green screen).

3. Press ESC or click STOP to halt a running program.

LOADING PROGRAMS
  Click LOAD and select a .bas file to load a program.
  The program appears in the text area — click RUN.

LOADING TAPE DATA (for adventure games, etc.)
  Some BASIC programs read data from "tape" (INPUT#-1).
  There are two ways to load tape data:

  METHOD 1 — Pre-load (recommended):
    1. Click "Load Tape" and select the .dat file
    2. The screen shows "TAPE LOADED: filename"
    3. Now RUN your program — data loads instantly

  METHOD 2 — On-demand:
    1. RUN the program first
    2. When it needs tape data, you'll see "INSERT TAPE"
       and the Load Tape button pulses amber
    3. Click "Load Tape" and select the file
    4. The program resumes automatically

KEYBOARD
  ESC or Ctrl+C .. BREAK (stop program)
  Enter .......... Submit input / execute command
  Click/tap screen . Refocus for keyboard input
  (On iPad/mobile: tap screen to open keyboard)`,

// Tab 1: Commands
`COMMANDS & SYNTAX
==================

Immediate Mode (type on green screen):
  RUN ............. Run the program
  LIST [n[-m]] .... List program lines
  NEW ............. Clear program memory
  CLEAR ........... Clear variables
  CONT ............ Continue after STOP
  LOAD ............ Load .bas file
  SAVE ............ Save program to file
  CLS ............. Clear screen
  DELETE n[-m] .... Delete line(s)

Program Statements:
  PRINT expr [;|,] expr ...
  PRINT@ pos, expr    (position 1–1024, TRS-80 upper-left=1; engine uses pos-1)
  PRINT TAB(n); expr
  LET var = expr      (LET is optional)
  INPUT ["prompt";] var [, var2 ...]
  GOTO line
  ON expr GOTO line1, line2, ...
  IF cond THEN action [ELSE action]
  FOR var = start TO end [STEP s]
  NEXT [var]
  GOSUB line / RETURN
  DIM var(size)
  DATA val1, val2 ... / READ var / RESTORE
  REM comment
  STOP / END
  PRINT#-1, expr      (write to tape)
  INPUT#-1, var        (read from tape)

Notes:
  - Every line needs a line number
  - Keywords must be UPPERCASE
  - Multiple statements per line with :
    10 A=1: B=2: PRINT A+B
  - Comparisons return -1 (true) or 0 (false)`,

// Tab 2: Functions
`FUNCTIONS & OPERATORS
======================

Math Functions:
  ABS(x) ......... Absolute value
  INT(x) ......... Integer part (floor)
  FIX(x) ......... Truncate toward zero
  SGN(x) ......... Sign (-1, 0, or 1)
  SQR(x) ......... Square root
  SIN(x), COS(x), TAN(x)  (radians)
  ATN(x) ......... Arctangent (radians); Level II
  EXP(x) ......... e^x
  LOG(x) ......... Natural log
  RND ............ Random float 0.0–0.999
  RND(0) ......... Random float 0.0–0.999
  RND(1) ......... Random float 0.0–0.999
  RND(n) n>1 ..... Random integer 1–n

String Functions:
  LEN(s$) ........ Length
  LEFT$(s$,n) .... First n chars
  RIGHT$(s$,n) ... Last n chars
  MID$(s$,p[,n]) . Substring (1-based)
  STR$(n) ........ Number to string
  VAL(s$) ........ String to number
  CHR$(n) ........ ASCII code to char
  ASC(s$) ........ Char to ASCII code
  STRING$(n,c) ... Repeat character
  INSTR([p,]s$,f$) Find substring
  INKEY$ ......... Get keypress (non-blocking)

Operators:
  + - * / ^ (power) MOD
  = <> < > <= >=
  AND  OR  NOT
  + (string concatenation)`,

// Tab 3: Graphics & Memory
`GRAPHICS & MEMORY
===================

Graphics (128 x 48 pixel overlay):
  SET(x,y) ....... Turn on pixel
  RESET(x,y) ..... Turn off pixel
  POINT(x,y) ..... Read pixel (0 or 1)
  x: 0–127, y: 0–47

Screen Memory:
  PEEK(addr) ..... Read memory byte
  POKE addr,val .. Write memory byte
  Screen: 15360–16383 (64x16 chars)
  Keyboard: PEEK(14400) for polling

Text Screen:
  64 columns x 16 rows
  Each text cell = 2x3 graphics pixels
  PRINT@ position (1–1024, same as TRS-80 Level II; upper-left = 1)

Variables:
  A–Z, A0–Z9      (numeric)
  A$–Z$, A0$–Z9$  (string)
  Arrays: DIM A(10) creates 11 elements (0–10)

Special:
  STR$(n) includes leading space for sign
  PRINT ; = no space, , = tab to column 16`,

// Tab 4: Adventures
`SCOTT ADAMS ADVENTURE GAMES
==============================

The simulator can run Scott Adams text adventures
using the SCOTTADV.BAS interpreter program.

SETUP:
  1. Click LOAD → select SCOTTADV.BAS
  2. Click "Load Tape" → select a .dat game file
     (e.g., adv01.dat = Adventureland)
  3. Click RUN
  4. Press Enter when prompted — the game loads!

PLAYING:
  Type two-word commands: verb + noun
    GO NORTH, GET AXE, OPEN DOOR, LOOK, etc.

  Movement shortcuts: N, S, E, W, U, D
  Special commands:
    I ............ Inventory
    L ............ Look around
    SCORE ........ Check your score

  Collect treasures (items with * in name)
  and bring them to the treasure room to score.

AVAILABLE GAMES (ScottFree .dat format):
  adv01.dat ... Adventureland
  adv02.dat ... Pirate Adventure
  adv03.dat ... Mission Impossible
  adv04.dat ... Voodoo Castle
  adv05.dat ... The Count
  adv06.dat ... Strange Odyssey
  adv07.dat ... Mystery Fun House
  adv08.dat ... Pyramid of Doom
  adv09.dat ... Ghost Town
  adv10.dat ... Savage Island Part 1
  adv11.dat ... Savage Island Part 2
  adv12.dat ... Golden Voyage
  adv13.dat ... Sorcerer of Claymorgue
  adv14a.dat .. Return to Pirate's Isle`
]; }

// ------------------------------------------------------------------
//  Screen Rendering
// ------------------------------------------------------------------
clearScreen() {
    this._flushGraphics();
    const ctx = this.ctx;
    ctx.fillStyle = 'black';
    ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
    this.screenContent = Array.from({length: ROWS}, () => Array(COLS).fill(' '));
    this.pixelMatrix   = Array.from({length: 48}, () => Array(128).fill(0));
    this.activePixels  = new Set();
    this.cursorRow = 0;
    this.cursorCol = 0;
    this._pendingGraphics = [];
    this.updateCursorDisplay();
}

drawChar(row, col, char) {
    const x = col * this.charW;
    const y = row * this.charH;
    this.ctx.fillStyle = 'black';
    this.ctx.fillRect(x, y, this.charW, this.charH);
    if (char && char !== ' ') {
        this.ctx.fillStyle = '#33ff33';
        this.ctx.font = this.screenFont;
        this.ctx.textBaseline = 'top';
        this.ctx.fillText(char, x + 1, y + 1);
    }
}

printToScreen(text, end = '\n') {
    const output = String(text) + end;
    const ctx = this.ctx;

    for (const char of output) {
        if (char === '\n' || this.cursorCol >= COLS) {
            this.cursorRow++;
            this.cursorCol = 0;
            if (this.cursorRow >= ROWS) {
                this._scrollScreenUp();
            }
            if (char === '\n') continue;
        }
        this.screenContent[this.cursorRow][this.cursorCol] = char;
        const x = this.cursorCol * this.charW;
        const y = this.cursorRow * this.charH;
        ctx.fillStyle = 'black';
        ctx.fillRect(x, y, this.charW, this.charH);
        if (char !== ' ') {
            ctx.fillStyle = '#33ff33';
            ctx.font = this.screenFont;
            ctx.textBaseline = 'top';
            ctx.fillText(char, x + 1, y + 1);
        }
        this.cursorCol++;
    }
    this.updateCursorDisplay();
}

redrawScreen() {
    const ctx = this.ctx;
    ctx.fillStyle = 'black';
    ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);
    const ps = this.pixelSize;
    // Graphics first, then text on top
    ctx.fillStyle = '#33ff33';
    for (const key of this.activePixels) {
        const [x, y] = key.split(',').map(Number);
        ctx.fillRect(x * ps, y * ps, ps, ps);
    }
    ctx.font = this.screenFont;
    ctx.textBaseline = 'top';
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const ch = this.screenContent[r][c];
            if (ch !== ' ') {
                ctx.fillStyle = '#33ff33';
                ctx.fillText(ch, c * this.charW + 1, r * this.charH + 1);
            }
        }
    }
}

_scrollScreenUp() {
    this.screenContent = this.screenContent.slice(1).concat([Array(COLS).fill(' ')]);
    this.cursorRow = ROWS - 1;
    this.pixelMatrix = this.pixelMatrix.slice(3).concat(
        Array.from({length: 3}, () => Array(128).fill(0))
    );
    const newActive = new Set();
    for (const key of this.activePixels) {
        const [x, y] = key.split(',').map(Number);
        if (y >= 3) newActive.add(`${x},${y - 3}`);
    }
    this.activePixels = newActive;
    this.redrawScreen();
}

// ------------------------------------------------------------------
//  Cursor
// ------------------------------------------------------------------
_blinkCursor() {
    if (this.programRunning && !this.waitingForInput) {
        if (this.cursorVisible) {
            this.cursorVisible = false;
            this._eraseCursor();
        }
        return;
    }
    this.cursorVisible = !this.cursorVisible;
    this.updateCursorDisplay();
}

_eraseCursor() {
    if (this._lastCursorRow !== undefined &&
        this._lastCursorRow >= 0 && this._lastCursorRow < ROWS &&
        this._lastCursorCol >= 0 && this._lastCursorCol < COLS &&
        this.screenContent[this._lastCursorRow]) {
        this.drawChar(this._lastCursorRow, this._lastCursorCol,
                      this.screenContent[this._lastCursorRow][this._lastCursorCol]);
    }
}

updateCursorDisplay() {
    this._eraseCursor();
    if (this.cursorVisible || this.waitingForInput) {
        const x = this.cursorCol * this.charW;
        const y = this.cursorRow * this.charH;
        this.ctx.fillStyle = '#33ff33';
        this.ctx.fillRect(x, y, this.charW, this.charH);
    }
    this._lastCursorRow = this.cursorRow;
    this._lastCursorCol = this.cursorCol;
}

// ------------------------------------------------------------------
//  Keyboard Input — mirrors on_key_press routing
// ------------------------------------------------------------------
_focusForInput() {
    if (this._isMobile) {
        this._mobileInput.focus();
    } else {
        this.canvas.focus();
    }
}

_handleKeyDown(event) {
    // BREAK: Esc or Ctrl+C
    if (this.programRunning && (event.key === 'Escape' || (event.ctrlKey && event.key === 'c'))) {
        this.breakProgram();
        event.preventDefault();
        return;
    }
    // Emergency reset: Ctrl+R
    if (event.ctrlKey && event.key === 'r') {
        this.programRunning = false;
        this.programPaused  = false;
        this.waitingForInput = false;
        this.inputVariables = null;
        this.enableImmediateMode();
        event.preventDefault();
        return;
    }

    // During program execution (not INPUT): update keyboard buffer
    if (this.programRunning && !this.waitingForInput) {
        if (!this.lastKeyPressed && event.key.length === 1) {
            this.lastKeyPressed = event.key.toUpperCase();
        }
        event.preventDefault();
        return;
    }

    // During INPUT command
    if (this.waitingForInput) {
        if (event.key === 'Enter') {
            this._handleInputReturn();
        } else if (event.key === 'Backspace') {
            this._handleInputBackspace();
        } else if (event.key.length === 1) {
            this._handleInputChar(event.key.toUpperCase());
        }
        event.preventDefault();
        return;
    }

    // Immediate mode
    if (this.immediateMode && !this.programRunning) {
        if (event.key === 'Enter') {
            this._handleImmediateModeReturn();
        } else if (event.key === 'Backspace') {
            this._handleImmediateModeBackspace();
        } else if (event.key.length === 1) {
            this._handleImmediateModeChar(event.key.toUpperCase());
        }
        event.preventDefault();
    }
}

// -- INPUT handling --
_handleInputChar(char) {
    if (this.cursorRow >= ROWS - 1 && this.cursorCol >= COLS - 1) {
        this._scrollScreenUp();
        this.cursorCol = 0;
    }
    this.screenContent[this.cursorRow][this.cursorCol] = char;
    this.drawChar(this.cursorRow, this.cursorCol, char);
    this.cursorCol++;
    if (this.cursorCol >= COLS) {
        this.cursorRow++;
        this.cursorCol = 0;
        if (this.cursorRow >= ROWS) this._scrollScreenUp();
    }
    this.updateCursorDisplay();
}

_handleInputBackspace() {
    const startRow = this.inputStartRow;
    const startCol = this.inputStartCol;
    if (this.cursorRow > startRow || (this.cursorRow === startRow && this.cursorCol > startCol)) {
        this.cursorCol--;
        if (this.cursorCol < 0) {
            this.cursorRow--;
            this.cursorCol = COLS - 1;
        }
        this.screenContent[this.cursorRow][this.cursorCol] = ' ';
        this.drawChar(this.cursorRow, this.cursorCol, ' ');
        this.updateCursorDisplay();
    }
}

_handleInputReturn() {
    if (!this.waitingForInput || !this.inputVariables || !this.inputVariables.length) return;

    let userInput = '';
    const sRow = this.inputStartRow;
    const sCol = this.inputStartCol;
    for (let row = sRow; row <= this.cursorRow; row++) {
        if (row === sRow && row === this.cursorRow) {
            userInput += this.screenContent[row].slice(sCol, this.cursorCol).join('');
        } else if (row === sRow) {
            userInput += this.screenContent[row].slice(sCol).join('');
        } else if (row === this.cursorRow) {
            userInput += this.screenContent[row].slice(0, this.cursorCol).join('');
        } else {
            userInput += this.screenContent[row].join('');
        }
    }
    userInput = userInput.trimEnd();
    this.debugPrint(`User input received: ${userInput}`);

    const parts = this._splitInputLineValues(userInput, this.inputVariables.length);
    for (let i = 0; i < this.inputVariables.length; i++) {
        this._assignInputValue(this.inputVariables[i], parts[i] != null ? parts[i] : '');
    }

    // Do not scroll on INPUT completion — same as TRS80_March_30_26.py (full-screen HELP/CLS).
    this.cursorCol = 0;
    if (this.cursorRow < ROWS - 1) {
        this.cursorRow++;
    } else {
        this.cursorRow = ROWS - 1;
    }

    this.waitingForInput = false;
    this.inputVariables = null;
    this.currentLineIndex++;

    if (this.variablesWindowOpen) this._updateVariablesContent();
    if (this.currentLineIndex >= this.sortedProgram.length) {
        this.programRunning = false;
        this._setStopBtn(false);
        this.enableImmediateMode();
    } else {
        this.debugPrint(`Resuming execution from line index: ${this.currentLineIndex}`);
        this.executeNextLine();
    }
}

_parseNumeric(s) {
    const n = Number(s);
    return isNaN(n) ? 0 : n;
}

// ------------------------------------------------------------------
//  Immediate Mode — mirrors enable_immediate_mode, handle_immediate_*
// ------------------------------------------------------------------
enableImmediateMode() {
    if (!this.programRunning && !this.waitingForInput) {
        this.immediateMode = true;
        this._focusForInput();
        this._ensureImmediatePrompt(true);
    }
}

disableImmediateMode() {
    this.immediateMode = false;
    this.commandBuffer = '';
}

_ensureImmediatePrompt(showReady = false) {
    if (showReady && this.cursorRow === 0 && this.cursorCol === 0) {
        this.printToScreen('READY');
    }
    const lineStr = this.screenContent[this.cursorRow].join('').trimEnd();
    if (lineStr.endsWith('>')) return;
    if (this.cursorCol > 0) this.printToScreen('');
    this.printToScreen('>', '');
}

_handleImmediateModeChar(char) {
    this.commandBuffer += char;
    this.screenContent[this.cursorRow][this.cursorCol] = char;
    this.drawChar(this.cursorRow, this.cursorCol, char);
    this.cursorCol++;
    if (this.cursorCol >= COLS) {
        this.cursorRow++;
        this.cursorCol = 0;
        if (this.cursorRow >= ROWS) this._scrollScreenUp();
    }
    this.updateCursorDisplay();
}

_handleImmediateModeBackspace() {
    if (this.commandBuffer.length > 0) {
        this.commandBuffer = this.commandBuffer.slice(0, -1);
        if (this.cursorCol > 1 || (this.cursorCol === 1 && this.screenContent[this.cursorRow][0] !== '>')) {
            this.cursorCol--;
            this.screenContent[this.cursorRow][this.cursorCol] = ' ';
            this.drawChar(this.cursorRow, this.cursorCol, ' ');
            this.updateCursorDisplay();
        }
    }
}

_handleImmediateModeReturn() {
    const command = this.commandBuffer.trim();
    this.commandBuffer = '';
    this.cursorRow++;
    this.cursorCol = 0;
    if (this.cursorRow >= ROWS) this._scrollScreenUp();
    if (command) this.processImmediateCommand(command);
    if (this.immediateMode && !this.programRunning && !this.waitingForInput) {
        this._ensureImmediatePrompt();
    }
}

processImmediateCommand(command) {
    this.debugPrint(`Immediate mode command: ${command}`);

    // Numbered line → store in program
    const firstWord = command.split(/\s+/)[0];
    if (/^\d+(\.\d+)?$/.test(firstWord)) {
        const lineNum = firstWord;
        this.storedProgram = this.storedProgram.filter(l => !l.match(new RegExp(`^${lineNum}\\s`)));
        if (command.split(/\s+/).length > 1) {
            this.storedProgram.push(command);
        }
        this.storedProgram.sort((a, b) => parseFloat(a) - parseFloat(b));
        this.inputArea.value = this.storedProgram.join('\n');
        return;
    }

    const cmdParts = command.split(/\s+/);
    const cmd = cmdParts[0];

    if (cmd === 'RUN') {
        this.disableImmediateMode();
        this.runProgram();
    } else if (cmd === 'LIST') {
        this.listProgram();
    } else if (cmd === 'NEW') {
        this.newProgram();
        this.storedProgram = [];
        this.inputArea.value = '';
        this.enableImmediateMode();
    } else if (cmd === 'CLEAR') {
        this.scalarVariables = {};
        this.arrayVariables  = {};
        this.arrayDimensions = {};
        this.userFunctions   = {};
        this._lastRnd        = 0;
        this.forLoops = {};
        this.gosubStack = [];
        this.dataPointer = 0;
        this.printToScreen('VARIABLES CLEARED');
    } else if (cmd === 'CONT') {
        if (this.programPaused) {
            this.disableImmediateMode();
            this.stopProgram();
        }
    } else if (cmd === 'LOAD') {
        this._triggerLoad();
    } else if (cmd === 'SAVE') {
        this.saveProgram();
    } else if (cmd === 'CLS') {
        this.clearScreen();
        this.printToScreen('READY');
    } else if (cmd === 'DELETE') {
        if (cmdParts.length > 1) this._deleteLines(cmdParts[1]);
    } else {
        try { this.executeCommand(command); }
        catch (e) { this.printToScreen(`?${e.message || e}`); }
    }
}

// ------------------------------------------------------------------
//  Preprocessor — mirrors preprocess_program
// ------------------------------------------------------------------
preprocessProgram(program) {
    const preprocessed = [];
    for (const line of program) {
        if (!line.includes(':')) { preprocessed.push(line); continue; }
        const parts = line.split(/\s+(.+)/);
        if (parts.length < 2) { preprocessed.push(line); continue; }
        const lineNumber = parts[0];
        const content = parts[1];
        const splitPositions = this._findSplitColons(content);
        if (splitPositions.length > 0) {
            let prev = 0;
            for (let idx = 0; idx < splitPositions.length; idx++) {
                const pos = splitPositions[idx];
                const stmt = content.substring(prev, pos).trim();
                prev = pos + 1;
                if (!stmt) continue;
                preprocessed.push(idx === 0 ? `${lineNumber} ${stmt}` : `${lineNumber}.${idx} ${stmt}`);
            }
            const last = content.substring(prev).trim();
            if (last) preprocessed.push(`${lineNumber}.${splitPositions.length} ${last}`);
        } else {
            preprocessed.push(line);
        }
    }
    return preprocessed;
}

_findSplitColons(content) {
    const positions = [];
    let inIfClause = false;
    const upper = content.toUpperCase();
    let i = 0;
    while (i < content.length) {
        if (content[i] === '"') { i++; while (i < content.length && content[i] !== '"') i++; i++; continue; }
        if (this._isKeywordAt(upper, i, 'REM')) break;
        if (this._isKeywordAt(upper, i, 'IF'))   inIfClause = true;
        if (this._isKeywordAt(upper, i, 'THEN') || this._isKeywordAt(upper, i, 'ELSE')) inIfClause = true;
        if (content[i] === ':' && !inIfClause) positions.push(i);
        i++;
    }
    return positions;
}

_isKeywordAt(text, pos, keyword) {
    if (text.substring(pos, pos + keyword.length) !== keyword) return false;
    if (pos > 0 && /[A-Z]/.test(text[pos - 1])) return false;
    if (pos + keyword.length < text.length && /[A-Z]/.test(text[pos + keyword.length])) return false;
    return true;
}

// ------------------------------------------------------------------
//  DATA pre-scan — mirrors _prescan_data
// ------------------------------------------------------------------
_prescanData() {
    this.dataValues  = [];
    this.dataPointer = 0;
    for (const line of this.sortedProgram) {
        const parts = line.split(/\s+(.+)/);
        if (parts.length < 2) continue;
        let content = parts[1];
        const cParts = content.split(/\s+(.+)/);
        if (/^\d+(\.\d+)?$/.test(cParts[0]) && cParts.length > 1) content = cParts[1];
        if (content.startsWith('DATA')) {
            const data = content.substring(4).trim();
            this.dataValues.push(...data.split(','));
        }
    }
    if (this.dataValues.length) this.debugPrint(`Pre-scanned ${this.dataValues.length} DATA values`);
}

// ------------------------------------------------------------------
//  Run & Execute — mirrors run_program, execute_next_line
// ------------------------------------------------------------------
runProgram() {
    this.newProgram();
    const program = this.inputArea.value.trim().split('\n');
    this.storedProgram  = this._sortProgramLines(program);
    this.originalProgram = [...program];
    const preprocessed  = this.preprocessProgram(this.storedProgram);
    this.sortedProgram  = preprocessed
        .filter(l => l.trim() && /^\d/.test(l.split(/\s/)[0].replace('.', '')))
        .sort((a, b) => parseFloat(a) - parseFloat(b));

    this._lineNumbers  = [];
    this._lineCommands = [];
    this._lineCmdWords = [];
    for (const line of this.sortedProgram) {
        const parts = line.trim().split(/\s+(.+)/);
        this._lineNumbers.push(parseFloat(parts[0]));
        const cmd = parts.length > 1 ? parts[1] : '';
        this._lineCommands.push(cmd);
        if (cmd) {
            let cw = cmd.split('(')[0].split(/\s/)[0];
            if (cw.startsWith('PRINT')) cw = 'PRINT';
            this._lineCmdWords.push(cw);
        } else {
            this._lineCmdWords.push('');
        }
    }

    this._usesInkey = this.sortedProgram.some(l => l.includes('INKEY$') || l.includes('PEEK(14400)'));
    this._prescanData();
    this.programRunning = true;
    this.programPaused  = false;
    this._setStopBtn(true);
    this.debugPrint('Starting program execution');
    this._focusForInput();
    if (this.variablesWindowOpen) this._updateVariablesContent();
    if (!this.stepping) this.executeNextLine();
}

async executeNextLine() {
    let updateCounter = 0;
    while (this.programRunning && !this.programPaused) {
        if (this.currentLineIndex >= this._lineNumbers.length || this._lineNumbers.length === 0) {
            this.programRunning = false;
            this._setStopBtn(false);
            this._flushGraphics();
            this.debugPrint('Program execution completed');
            if (this.variablesWindowOpen) this._updateVariablesContent();
            if (!this.immediateMode) this.enableImmediateMode();
            this._focusForInput();
            return;
        }

        const lineNumber = this._lineNumbers[this.currentLineIndex];
        let command = this._lineCommands[this.currentLineIndex];

        if (this.debugMode) this.debugPrint(`Executing line ${lineNumber}: ${command}`);

        if (command) {
            const cmdParts = command.split(/\s+(.+)/);
            let cmdWord;
            if (cmdParts.length > 1 && /^\d+$/.test(cmdParts[0])) {
                command = cmdParts[1];
                cmdWord = null;
            } else {
                cmdWord = this.currentLineIndex < this._lineCmdWords.length
                    ? this._lineCmdWords[this.currentLineIndex] : null;
            }

            const result = this.executeCommand(command, cmdWord);

            if (result && result.__delay !== undefined) {
                await new Promise(r => setTimeout(r, result.__delay));
                this.currentLineIndex++;
            } else if (typeof result === 'number') {
                const newIndex = this.findLineIndex(result);
                if (newIndex !== -1) {
                    this.currentLineIndex = newIndex;
                } else {
                    this._errorUl(result);
                    this.programRunning = false;
                    if (this.variablesWindowOpen) this._updateVariablesContent();
                    return;
                }
            } else if (this.waitingForInput) {
                this._flushGraphics();
                if (this.variablesWindowOpen) this._updateVariablesContent();
                return;
            } else {
                this.currentLineIndex++;
            }
        } else {
            this.currentLineIndex++;
        }

        updateCounter++;
        if (updateCounter % 100 === 0 && this.variablesWindowOpen) this._updateVariablesContent();
        if (this._usesInkey || updateCounter % 20 === 0) {
            await new Promise(r => setTimeout(r, 0));
        }
        if (updateCounter % 50 === 0) this._flushGraphics();

        if (this.stepping) {
            this._flushGraphics();
            if (this.variablesWindowOpen) this._updateVariablesContent();
            return;
        }
    }
    if (this.variablesWindowOpen) this._updateVariablesContent();
}

newProgram() {
    this.scalarVariables = {};
    this.arrayVariables  = {};
    this.arrayDimensions = {};
    this.userFunctions   = {};
    this._lastRnd        = 0;
    this.forLoops        = {};
    this.currentLineIndex = 0;
    this.waitingForInput = false;
    this.inputVariables  = null;
    this.gosubStack      = [];
    this.programRunning  = false;
    this.programPaused   = false;
    this.lastKeyPressed  = null;
    this.dataPointer     = 0;
    this.dataValues      = [];
    this._lineNumbers    = [];
    this._lineCommands   = [];
    this._lineCmdWords   = [];
    this._sortedVarsCache = [];
    this._lastVarCount    = 0;
    this._arrayPatterns   = {};
    this._varRegexCache   = {};
    this._resetScreenArrays();
    this.clearScreen();
    this._pendingGraphics = [];
    this.tapePointer = 0;
    this._lastDebugCommand = '';
    this._lastEvalOriginal = '';
    this._lastEvalSubstituted = '';
    this.commandBuffer = '';
    this.debugPrint('New program initialized.');
    if (this.variablesWindowOpen) this._updateVariablesContent();
}

// ------------------------------------------------------------------
//  Command Dispatch — mirrors _init_command_handlers, execute_command
// ------------------------------------------------------------------
_initCommandHandlers() {
    this._commandHandlers = {
        'PRINT':   (c) => this._cmdPrint(c),
        'LET':     (c) => this._cmdLet(c),
        'REM':     ()  => {},
        'POKE':    (c) => this._cmdPoke(c),
        'SET':     (c) => this._cmdSetReset(c),
        'RESET':   (c) => this._cmdSetReset(c),
        'CLS':     ()  => { this.clearScreen(); },
        'DIM':     (c) => this._cmdDim(c),
        'INPUT':   (c) => this._cmdInput(c),
        'GOTO':    (c) => this._cmdGoto(c),
        'IF':      (c) => this._cmdIf(c),
        'FOR':     (c) => this._cmdFor(c),
        'NEXT':    (c) => this._cmdNext(c),
        'ON':      (c) => this._cmdOn(c),
        'GOSUB':   (c) => this._cmdGosub(c),
        'RETURN':  ()  => this._cmdReturn(),
        'DELAY':   (c) => this._cmdDelay(c),
        'DATA':    ()  => {},
        'READ':    (c) => this._cmdRead(c),
        'RESTORE': ()  => { this.dataPointer = 0; },
        'STOP':    ()  => this._cmdStop(),
        'END':     ()  => this._cmdEnd(),
        'LOAD':    (c) => this._cmdLoad(c),
        'DEF':     (c) => this._cmdDef(c),
    };
}

executeCommand(command, cmdWord = null) {
    const original = command;
    if (this.debugMode) this._lastDebugCommand = original;

    try {
        if (command.startsWith('INPUT#-1')) return this._cmdInputTape(command);
        if (command.startsWith('PRINT#-1')) return this._cmdPrintTape(command);

        if (cmdWord === null) {
            cmdWord = command.split('(')[0].split(/\s/)[0];
            if (cmdWord.startsWith('PRINT')) cmdWord = 'PRINT';
        }

        // Bare line number = implicit GOTO (e.g., THEN 1200)
        if (/^\d+$/.test(command.trim())) return parseInt(command.trim());

        let handler = this._commandHandlers[cmdWord];
        if (!handler && command.includes('=')) {
            command = 'LET ' + command;
            cmdWord = 'LET';
            handler = this._commandHandlers['LET'];
            if (this.debugMode) this.debugPrint(`AUTO LET -> ${command}`);
        }

        if (handler) return handler(command);
        else this.debugPrint(`Unknown command: ${command}`, 'warning');
    } catch (e) {
        this.debugPrint(`Error executing: ${original}`, 'error');
        if (this._lastEvalOriginal) this.debugPrint(`Expression: ${this._lastEvalOriginal}`, 'error');
        if (this._lastEvalSubstituted && this._lastEvalSubstituted !== this._lastEvalOriginal)
            this.debugPrint(`Expanded: ${this._lastEvalSubstituted}`, 'error');
        this.debugPrint(`Detail: ${e.message || e}`, 'error');
        this.programRunning = false;
        this._setStopBtn(false);
    }
    return undefined;
}

// ------------------------------------------------------------------
//  Number Formatting — mirrors _format_number
// ------------------------------------------------------------------
_formatNumber(value) {
    if (typeof value === 'number') {
        let s;
        if (Number.isFinite(value) && value === Math.trunc(value)) {
            s = String(Math.trunc(value));
        } else {
            s = String(value);
        }
        return value >= 0 ? ' ' + s + ' ' : s + ' ';
    }
    return String(value);
}

// ------------------------------------------------------------------
//  PRINT — mirrors _cmd_print
// ------------------------------------------------------------------
_cmdPrint(command) {
    const isPrintAt = command.startsWith('PRINT@');

    let content;
    if (isPrintAt) {
        const match = command.match(this._re.printAt);
        if (match) {
            const posExpr = match[1];
            content = match[2] || '';
            // TRS-80 Level II: PRINT@ uses 1..1024; subtract 1 for 0-based row/col (mirrors _cmd_print in TRS80_March_30_26.py).
            let position = Math.trunc(this.evaluateExpression(posExpr)) - 1;
            this.cursorRow = Math.trunc(position / COLS);
            this.cursorCol = position % COLS;
        } else return;
    } else {
        content = command.substring(5).trim();
    }

    let output = '';
    let cursorPos = this.cursorCol;
    let start = 0;

    while (start < content.length) {
        const end = this._findNextSeparator(content, start);
        let part;
        if (end === -1) { part = content.substring(start); start = content.length; }
        else { part = content.substring(start, end); start = end + 1; }

        if (part.trim()) {
            if (part.includes('TAB(')) {
                const m = part.match(this._re.tab);
                if (m) {
                    const tabPos = parseInt(m[1]);
                    const spacesNeeded = Math.max(0, tabPos - cursorPos);
                    output += ' '.repeat(spacesNeeded);
                    cursorPos = tabPos;
                }
            } else {
                const evaluated = this.evaluateExpression(part.trim());
                const formatted = this._formatNumber(evaluated);
                output += formatted;
                cursorPos += formatted.length;
            }
        }

        if (end !== -1 && content[end] === ',') {
            const spacesToAdd = (16 - cursorPos % 16) % 16;
            output += ' '.repeat(spacesToAdd);
            cursorPos += spacesToAdd;
        }
    }

    // PRINT@ is "set cursor, then PRINT" — no batch pre-clearing.
    // Each character write in printToScreen already clears its cell.

    const trimmed = content.trimEnd();
    if (trimmed.endsWith(';') || trimmed.endsWith(',')) {
        this.printToScreen(output, '');
    } else {
        this.printToScreen(output, '\n');
    }

    // Do not restore cursor after PRINT@ — INPUT ? follows last PRINT (mirrors TRS80_March_30_26.py).
}

_findNextSeparator(s, start) {
    let parenCount = 0;
    for (let i = start; i < s.length; i++) {
        if (s[i] === '(' && !this._isWithinQuotes(s, i)) parenCount++;
        else if (s[i] === ')' && !this._isWithinQuotes(s, i)) parenCount--;
        else if ((s[i] === ',' || s[i] === ';') && parenCount === 0 && !this._isWithinQuotes(s, i))
            return i;
    }
    return -1;
}

_isWithinQuotes(s, pos) {
    let count = 0;
    for (let i = 0; i < pos; i++) if (s[i] === '"') count++;
    return count % 2 === 1;
}

// ------------------------------------------------------------------
//  LET — mirrors _cmd_let
// ------------------------------------------------------------------
_cmdLet(command) {
    // LET A=1:B=2 — split on unquoted colons so values are not "INT(x):Y=..."
    const body = command.substring(3).trim();
    const segments = this._splitOnUnquotedColons(body);
    if (segments.length > 1) {
        for (const seg of segments) {
            const s = seg.trim();
            if (s) this.executeCommand(s);
        }
        return;
    }
    const eqPos = command.indexOf('=', 3);
    if (eqPos === -1) return;
    const varName = command.substring(3, eqPos).trim();
    const valueExpr = command.substring(eqPos + 1).trim();

    const arrayMatch = varName.match(this._re.arrayMatch);
    if (arrayMatch) {
        const [, arrayName, indexExpr] = arrayMatch;
        const index = this._computeArrayLinearIndex(arrayName, indexExpr);
        if (this.arrayVariables[arrayName]) {
            if (index >= 0 && index < this.arrayVariables[arrayName].length) {
                this.arrayVariables[arrayName][index] = arrayName.endsWith('$')
                    ? String(this.evaluateExpression(valueExpr))
                    : this.evaluateExpression(valueExpr);
            } else { this._errorBs(arrayName, index); }
        } else { this._errorSn(`Array ${arrayName} not defined`); }
    } else {
        if (varName.endsWith('$')) {
            this.scalarVariables[varName] = String(this.evaluateExpression(valueExpr));
        } else {
            this.scalarVariables[varName] = this.evaluateExpression(valueExpr);
        }
        if (this.debugMode) this.debugPrint(`${varName} = ${this.scalarVariables[varName]}`);
    }
}

// ------------------------------------------------------------------
//  POKE, SET/RESET, CLS, DIM
// ------------------------------------------------------------------
_cmdPoke(command) {
    const m = command.match(this._re.poke);
    if (m) {
        const addr = Math.trunc(this.evaluateExpression(m[1]));
        const val  = Math.trunc(this.evaluateExpression(m[2]));
        this.poke(addr, val);
    }
}

_cmdSetReset(command) {
    try {
        const cmdType = command.startsWith('SET') ? 'SET' : 'RESET';
        const parenStart = command.indexOf('(');
        const parenEnd   = command.lastIndexOf(')');
        if (parenStart === -1 || parenEnd === -1) return;
        const coords = command.substring(parenStart + 1, parenEnd);
        const commaPos = this._findUnquotedComma(coords);
        if (commaPos === -1) return;
        const x = Math.trunc(this.evaluateExpression(coords.substring(0, commaPos).trim())) - 1;
        const y = Math.trunc(this.evaluateExpression(coords.substring(commaPos + 1).trim())) - 1;
        if (cmdType === 'SET') this.setPixel(x, y);
        else this.resetPixel(x, y);
    } catch (e) {
        this.debugPrint(`Invalid ${command.split(/\s/)[0]} command: ${command}`, 'error');
    }
}

_findUnquotedComma(s) {
    let depth = 0;
    for (let i = 0; i < s.length; i++) {
        if (s[i] === '(') depth++;
        else if (s[i] === ')') depth--;
        else if (s[i] === ',' && depth === 0) return i;
    }
    return -1;
}

/** Split on first comma not inside parentheses; returns [left, right] or [s, null]. */
_splitTopLevelComma(s) {
    let depth = 0;
    for (let i = 0; i < s.length; i++) {
        const ch = s[i];
        if (ch === '(') depth++;
        else if (ch === ')') depth--;
        else if (ch === ',' && depth === 0) {
            return [s.substring(0, i).trim(), s.substring(i + 1).trim()];
        }
    }
    return [s.trim(), null];
}

/** Split on every comma at paren depth 0 (and not inside quotes). Used for LEFT$/RIGHT$/MID$/ etc. */
_splitAllTopLevelCommas(s) {
    const quoteMap = this._buildQuoteMap(s);
    const parts = [];
    let depth = 0;
    let start = 0;
    for (let i = 0; i < s.length; i++) {
        if (quoteMap[i]) continue;
        const ch = s[i];
        if (ch === '(') depth++;
        else if (ch === ')') depth--;
        else if (ch === ',' && depth === 0) {
            parts.push(s.substring(start, i).trim());
            start = i + 1;
        }
    }
    parts.push(s.substring(start).trim());
    return parts;
}

/** Parse INPUT ["prompt";] var1, var2, ... — returns { prompt, variables }. */
_parseInputCommand(command) {
    const cmd = command.trim();
    if (!/^INPUT/i.test(cmd)) return { prompt: null, variables: [] };
    let rest = cmd.slice(5).trimStart();
    let prompt = null;
    if (rest.startsWith('"')) {
        let i = 1;
        while (i < rest.length && rest[i] !== '"') i++;
        prompt = rest.slice(1, i);
        rest = rest.slice(i + 1).trimStart();
        if (!rest.startsWith(';')) return { prompt: null, variables: [] };
        rest = rest.slice(1).trimStart();
    }
    if (!rest) return { prompt, variables: [] };
    const variables = this._splitAllTopLevelCommas(rest).map(s => s.trim()).filter(Boolean);
    return { prompt, variables };
}

/** One line of user input → one string per INPUT variable (comma-split if n>1). */
_splitInputLineValues(userInput, numVars) {
    if (numVars <= 1) return [userInput != null ? String(userInput).trim() : ''];
    const s = String(userInput).trim();
    if (!s) return Array(numVars).fill('');
    let parts = this._splitAllTopLevelCommas(s);
    while (parts.length < numVars) parts.push('');
    return parts.slice(0, numVars).map(p => p.trim());
}

_assignInputValue(varSpec, valueStr) {
    const spec = varSpec.trim();
    const arrayMatch = spec.match(this._re.arrayMatch);
    if (arrayMatch) {
        const [, arrayName, indexExpr] = arrayMatch;
        const index = this._computeArrayLinearIndex(arrayName, indexExpr);
        if (this.arrayVariables[arrayName] && index >= 0 && index < this.arrayVariables[arrayName].length) {
            this.arrayVariables[arrayName][index] = arrayName.endsWith('$') ? valueStr : this._parseNumeric(valueStr);
        }
    } else {
        if (spec.endsWith('$')) this.scalarVariables[spec] = valueStr;
        else this.scalarVariables[spec] = this._parseNumeric(valueStr);
    }
}

/** TRS-80 A(I,J): linear index = I * (maxJ + 1) + J */
_computeArrayLinearIndex(arrayName, indexExpr) {
    const t = indexExpr.trim();
    const dims = this.arrayDimensions[arrayName];
    if (dims === undefined) {
        return Math.trunc(this._evalNested(t));
    }
    const [left, right] = this._splitTopLevelComma(t);
    if (right === null) {
        return Math.trunc(this._evalNested(t));
    }
    const d2max = dims[1];
    const i = Math.trunc(this._evalNested(left));
    const j = Math.trunc(this._evalNested(right));
    return i * (d2max + 1) + j;
}

_cmdDim(command) {
    const m = command.match(this._re.dim);
    if (m) {
        const arrayName = m[1];
        const sizeExpr = m[2].trim();
        const commaPos = this._findUnquotedComma(sizeExpr);
        if (commaPos === -1) {
            const size = Math.trunc(this.evaluateExpression(sizeExpr));
            this.arrayVariables[arrayName] = arrayName.endsWith('$')
                ? Array(size + 1).fill('')
                : Array(size + 1).fill(0);
            delete this.arrayDimensions[arrayName];
        } else {
            const d1 = Math.trunc(this.evaluateExpression(sizeExpr.substring(0, commaPos).trim()));
            const d2 = Math.trunc(this.evaluateExpression(sizeExpr.substring(commaPos + 1).trim()));
            const total = (d1 + 1) * (d2 + 1);
            this.arrayVariables[arrayName] = arrayName.endsWith('$')
                ? Array(total).fill('')
                : Array(total).fill(0);
            this.arrayDimensions[arrayName] = [d1, d2];
        }
        this._arrayPatterns[arrayName] = new RegExp('\\b' + arrayName.replace('$', '\\$') + '\\(');
        this.debugPrint(`Array ${arrayName} dimensioned (${this.arrayVariables[arrayName].length} elements)`);
    }
}

_cmdDef(command) {
    const m = command.match(/^DEF\s+FN([A-Z])\s*\(\s*([A-Z][A-Z0-9]*\$?)\s*\)\s*=\s*(.+)$/);
    if (m) {
        const letter = m[1];
        const param  = m[2];
        const body   = m[3];
        this.userFunctions[letter] = { param, body };
        if (this.debugMode) this.debugPrint(`DEF FN${letter}(${param}) = ${body}`);
    }
}

// ------------------------------------------------------------------
//  INPUT — mirrors _cmd_input
// ------------------------------------------------------------------
_cmdInput(command) {
    const { prompt, variables } = this._parseInputCommand(command);
    if (!variables.length) return;
    if (prompt != null) this.printToScreen(prompt, '');
    else this.printToScreen('? ', '');
    this.waitingForInput = true;
    this.inputVariables = variables;
    this.inputStartRow = this.cursorRow;
    this.inputStartCol = this.cursorCol;
    this._focusForInput();
}

// ------------------------------------------------------------------
//  GOTO, IF/THEN/ELSE, FOR/NEXT, ON GOTO, GOSUB/RETURN
// ------------------------------------------------------------------
_cmdGoto(command) {
    return parseInt(command.substring(4).trim());
}

_cmdIf(command) {
    const m = command.match(this._re.ifThen);
    if (m) {
        const condition = m[1];
        const thenAction = m[2];
        const elseAction = m[4] || null;
        const result = this.evaluateExpression(condition);
        if (result) {
            if (this.debugMode) this.debugPrint(`IF ${condition} -> TRUE; THEN ${thenAction}`);
            // Implicit GOTO: IF ... THEN <line-number>
            const trimmed = thenAction.trim();
            if (/^\d+$/.test(trimmed)) return parseInt(trimmed);
            return this._executeMultiStatement(thenAction);
        } else if (elseAction) {
            if (this.debugMode) this.debugPrint(`IF ${condition} -> FALSE; ELSE ${elseAction}`);
            const trimmed = elseAction.trim();
            if (/^\d+$/.test(trimmed)) return parseInt(trimmed);
            return this._executeMultiStatement(elseAction);
        }
    }
}

_executeMultiStatement(statements) {
    const parts = this._splitOnUnquotedColons(statements);
    let result;
    for (let i = 0; i < parts.length; i++) {
        const trimmed = parts[i].trim();
        if (trimmed) {
            result = this.executeCommand(trimmed);
            if (typeof result === 'number') {
                // If this was a GOSUB and there are remaining statements,
                // attach them to the top gosub stack entry so _cmdReturn
                // can execute them after the subroutine finishes.
                if (trimmed.toUpperCase().startsWith('GOSUB')
                        && i < parts.length - 1
                        && this.gosubStack.length > 0) {
                    const remaining = parts.slice(i + 1).map(p => p.trim()).filter(p => p);
                    if (remaining.length > 0) {
                        const top = this.gosubStack[this.gosubStack.length - 1];
                        const idx = (typeof top === 'object' && top !== null) ? top.idx : top;
                        this.gosubStack[this.gosubStack.length - 1] = { idx, remaining };
                    }
                }
                return result;
            }
        }
    }
    return result;
}

_splitOnUnquotedColons(text) {
    const parts = [];
    let current = [];
    let inQuotes = false;
    for (const ch of text) {
        if (ch === '"') inQuotes = !inQuotes;
        if (ch === ':' && !inQuotes) { parts.push(current.join('')); current = []; }
        else current.push(ch);
    }
    parts.push(current.join(''));
    return parts;
}

_cmdFor(command) {
    const m = command.match(this._re.forLoop);
    if (m) {
        const varName = m[1];
        const start = this.evaluateExpression(m[2]);
        const end   = this.evaluateExpression(m[3]);
        const step  = m[5] ? this.evaluateExpression(m[5]) : 1;
        const nextIdx = this.currentLineIndex + 1;
        const nextLn  = nextIdx < this._lineNumbers.length ? this._lineNumbers[nextIdx] : null;
        this.forLoops[varName] = { start, end, step, current: start, lineIndex: this.currentLineIndex, nextLineNumber: nextLn };
        this.scalarVariables[varName] = start;
        if (this.debugMode) this.debugPrint(`FOR ${varName}=${start} TO ${end} STEP ${step}`);
    }
}

_cmdNext(command) {
    const keys = Object.keys(this.forLoops);
    if (keys.length === 0) { this._errorNf(''); return; }
    let nextVar = command.substring(4).trim();
    let varName;
    if (nextVar) {
        if (this.forLoops[nextVar]) varName = nextVar;
        else { this._errorNf(nextVar); return; }
    } else {
        varName = keys[keys.length - 1];
    }
    const loop = this.forLoops[varName];
    // Read from scalar variable so manual changes (e.g., AI=NA to break loop)
    // are respected — real TRS-80 BASIC reads the variable, not an internal copy
    loop.current = (this.scalarVariables[varName] ?? loop.current) + loop.step;
    this.scalarVariables[varName] = loop.current;
    if ((loop.step > 0 && loop.current <= loop.end) || (loop.step < 0 && loop.current >= loop.end)) {
        return loop.nextLineNumber;
    } else {
        delete this.forLoops[varName];
    }
}

_cmdOn(command) {
    const m = command.match(this._re.onGoto);
    if (m) {
        const value = Math.trunc(this.evaluateExpression(m[1]));
        const targets = m[2].split(',').map(s => parseInt(s.trim()));
        if (value >= 1 && value <= targets.length) return targets[value - 1];
    }
}

_cmdGosub(command) {
    const lineNum = parseInt(command.substring(5).trim());
    this.gosubStack.push(this.currentLineIndex + 1);
    return lineNum;
}

_cmdReturn() {
    if (this.gosubStack.length > 0) {
        const entry = this.gosubStack.pop();
        // Unpack: entry is either a plain number or {idx, remaining}
        let returnIndex, remaining;
        if (typeof entry === 'object' && entry !== null) {
            returnIndex = entry.idx;
            remaining = entry.remaining;
        } else {
            returnIndex = entry;
            remaining = null;
        }
        // Execute any remaining statements from IF..THEN GOSUB X: Y: Z
        if (remaining && remaining.length > 0) {
            const result = this._executeMultiStatement(remaining.join(':'));
            if (typeof result === 'number') return result;
        }
        if (returnIndex < this._lineNumbers.length) return this._lineNumbers[returnIndex];
    } else { this._errorRg(); }
}

_cmdDelay(command) {
    const delayTime = parseInt(command.split(/\s+/)[1]) || 0;
    return { __delay: delayTime * 10 };
}

_cmdRead(command) {
    const variables = command.substring(4).split(',').map(s => s.trim());
    for (const varName of variables) {
        if (this.dataPointer >= this.dataValues.length) { this._errorOd(); return; }
        let value = this.dataValues[this.dataPointer].trim();
        const arrayMatch = varName.match(this._re.arrayMatch);
        if (arrayMatch) {
            const [, arrName, idxExpr] = arrayMatch;
            const idx = this._computeArrayLinearIndex(arrName, idxExpr);
            if (this.arrayVariables[arrName] && idx >= 0 && idx < this.arrayVariables[arrName].length) {
                this.arrayVariables[arrName][idx] = arrName.endsWith('$')
                    ? value.replace(/^['"]|['"]$/g, '') : this.evaluateExpression(value);
            }
        } else {
            if (varName.endsWith('$')) {
                this.scalarVariables[varName] = value.replace(/^['"]|['"]$/g, '');
            } else {
                this.scalarVariables[varName] = this.evaluateExpression(value);
            }
        }
        this.dataPointer++;
    }
}

_cmdStop() {
    const ln = this._getCurrentLineNumber();
    this.printToScreen(`BREAK IN ${ln}`);
    this.programPaused = true;
    this._setStopBtn(true, 'CONT');
    this.enableImmediateMode();
}

_cmdEnd() {
    this.programRunning = false;
    this._setStopBtn(false);
    this._flushGraphics();
}

// LOAD called from within a running BASIC program:
// stops the current program, opens the file picker, loads the new .bas, and auto-RUNs it.
_cmdLoad(command) {
    this.programRunning = false;
    this._setStopBtn(false);
    this._flushGraphics();
    this._autoRunAfterLoad = true;      // signal _handleFileLoad to RUN when done
    this._triggerLoad();
}

// -- Tape I/O (in-memory) --
_cmdInputTape(command) {
    const varName = command.split(',')[1].trim();
    if (this.tapePointer < this.tapeData.length) {
        this.scalarVariables[varName] = this.tapeData[this.tapePointer++];
        this.debugPrint(`Tape read: ${varName} = ${this.scalarVariables[varName]}`);
    } else {
        // No tape loaded — pause execution and prompt the user to insert tape.
        // Step back so this same INPUT#-1 line re-executes after tape is loaded.
        this.currentLineIndex--;
        this.waitingForTape = true;
        this.programPaused  = true;
        this._setTapeButtonWaiting(true);
        this.printToScreen('INSERT TAPE');
        this.debugPrint('Program paused: waiting for tape data file');
    }
}

_cmdPrintTape(command) {
    const data = this.evaluateExpression(command.split(',').slice(1).join(',').trim());
    this.tapeData.push(String(data));
}

// Light up / dim the Insert-Tape button
_setTapeButtonWaiting(on) {
    const btn = document.getElementById('btnTape');
    if (on) {
        btn.textContent = '⬤ INSERT TAPE';
        btn.classList.add('tape-waiting');
    } else {
        btn.textContent = 'Load Tape';
        btn.classList.remove('tape-waiting');
    }
}

// User clicked "Load Tape" / "INSERT TAPE" button
_triggerTapeLoad() {
    document.getElementById('tapeInput').click();
}

// Called when user picks a data file; if program was paused waiting, resume it
_handleTapeFileLoad(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        // Parse each non-empty line as a tape value (same format as Python tape)
        const lines = e.target.result.split('\n').map(l => l.trim()).filter(l => l !== '');
        // Replace remaining tape from current pointer onward with new data
        this.tapeData    = lines;
        this.tapePointer = 0;
        this.printToScreen(`TAPE LOADED: ${file.name} (${lines.length} records)`);
        this.debugPrint(`Tape loaded: ${file.name}, ${lines.length} records`);

        if (this.waitingForTape) {
            // Program was paused waiting for tape — resume it now
            this.waitingForTape = false;
            this.programPaused  = false;
            this._setTapeButtonWaiting(false);
            setTimeout(() => this.executeNextLine(), 50);
        }
        // Re-focus the canvas so keyboard input works immediately
        setTimeout(() => this._focusForInput(), 100);
    };
    reader.readAsText(file);
    event.target.value = '';
}
