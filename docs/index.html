async _loadFromGitHub(selectEl, type) {
    const url = selectEl.value;
    if (!url) return;
    const filename = url.split('/').pop();
    try {
        // Avoid stale cached 404s: raw.githubusercontent.com can cache misses for a few minutes
        // after a file is first pushed (browser may still show "no loading" / silent failure).
        const bustUrl = url.includes('raw.githubusercontent.com')
            ? `${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`
            : url;
        const response = await fetch(bustUrl, { cache: 'no-store', mode: 'cors' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        let content = await response.text();
        if (content.charCodeAt(0) === 0xfeff) content = content.slice(1);

        if (type === 'bas') {
            const lines = this._sortProgramLines(content.trim().split('\n'));
            this.inputArea.value = lines.join('\n');
            this.storedProgram = lines;
            this.printToScreen(`LOADED: ${filename}`);
            this.enableImmediateMode();
        } else {
            const lines = content.split('\n').map(l => l.trim()).filter(l => l !== '');
            this.tapeData    = lines;
            this.tapePointer = 0;
            this.printToScreen(`TAPE LOADED: ${filename} (${lines.length} records)`);
            this.debugPrint(`Tape loaded from GitHub: ${filename}, ${lines.length} records`);
            if (this.waitingForTape) {
                this.waitingForTape = false;
                this.programPaused  = false;
                this._setTapeButtonWaiting(false);
                setTimeout(() => this.executeNextLine(), 50);
            }
        }
        setTimeout(() => this._focusForInput(), 100);
    } catch (err) {
        this.printToScreen(`?LOAD ERROR: ${err.message}`);
        if (this.debugMode) this.debugPrint(`LOAD failed: ${url} — ${err.message}`, 'error');
    }
    selectEl.selectedIndex = 0;
}

// ------------------------------------------------------------------
//  Expression Evaluator — mirrors evaluate_expression, _eval_nested
// ------------------------------------------------------------------
static PROTECTED_FUNCTIONS = new Set([
    'SIN','COS','TAN','EXP','LOG','SQR','ABS','INT','RND',
    'CHR$','STR$','LEFT$','RIGHT$','MID$','INSTR','LEN',
    'ASC','VAL','PEEK','POINT','FIX','SGN','STRING$'
]);

evaluateExpression(expr) {
    this._lastEvalOriginal    = expr;
    this._lastEvalSubstituted = expr;
    this.replaced = false;
    const stripped = expr.trim();

    // Fast path: integer
    if (/^\d+$/.test(stripped)) return parseInt(stripped);
    // Fast path: negative integer
    if (stripped.length > 1 && stripped[0] === '-' && /^\d+$/.test(stripped.substring(1)))
        return parseInt(stripped);
    // Fast path: simple variable lookup
    if (this.scalarVariables.hasOwnProperty(stripped)) return this.scalarVariables[stripped];

    return this._evalNested(expr);
}

_buildQuoteMap(s) {
    const n = s.length;
    const map = new Uint8Array(n);
    let inDouble = 0, inSingle = 0;
    for (let i = 0; i < n; i++) {
        const ch = s[i];
        if (ch === '"' && !inSingle) inDouble ^= 1;
        else if (ch === "'" && !inDouble) inSingle ^= 1;
        map[i] = inDouble | inSingle;
    }
    return map;
}

_evalNested(expr) {
    // Stage 1: Quote map
    let quoteMap = this._buildQuoteMap(expr);
    const isInQuotes = (pos) => pos < quoteMap.length && quoteMap[pos];

    // Stage 2: INKEY$ replacement
    const inkeyMatch = this._re.inkey.exec(expr);
    if (inkeyMatch && !isInQuotes(inkeyMatch.index)) {
        const inkeyResult = this.inkey();
        expr = expr.substring(0, inkeyMatch.index) + `'${inkeyResult}'` + expr.substring(inkeyMatch.index + inkeyMatch[0].length);
        this.replaced = true;
        quoteMap = this._buildQuoteMap(expr);
    }

    // Stage 3: Single-pass keyword translation
    const prevExpr = expr;
    expr = expr.replace(this._re.allKeywords, (match, offset) => {
        if (offset < quoteMap.length && quoteMap[offset]) return match;
        if (match === 'RND') return String(Math.random());
        return KEYWORD_REPLACEMENTS[match] || match;
    });
    // Reset the global regex lastIndex
    this._re.allKeywords.lastIndex = 0;
    if (expr !== prevExpr) quoteMap = this._buildQuoteMap(expr);

    // Stage 4: Built-in function dispatch (paren-counting for arbitrary nesting depth)
    while (true) {
        const funcMatch = this._re.funcMatch.exec(expr);
        if (!funcMatch) break;
        if (isInQuotes(funcMatch.index)) break;

        const funcName  = funcMatch[1];
        // Find matching close paren via counting (handles any nesting depth)
        const argStart = funcMatch.index + funcMatch[0].length;
        let depth = 1, argEnd = argStart;
        for (let ci = argStart; ci < expr.length; ci++) {
            if (expr[ci] === '(') depth++;
            else if (expr[ci] === ')') { depth--; if (depth === 0) { argEnd = ci; break; } }
        }
        if (depth !== 0) break;
        const innerExpr = expr.substring(argStart, argEnd);
        const innerValue = this._evalNested(innerExpr);

        const handler = this._builtinFunctions[funcName];
        if (handler) {
            const result = handler(innerValue, innerExpr);
            expr = expr.substring(0, funcMatch.index) + String(result) + expr.substring(argEnd + 1);
            quoteMap = this._buildQuoteMap(expr);
        } else {
            this.debugPrint(`Unknown function: ${funcName}`, 'error');
            break;
        }
    }

    // Stage 4b: User-defined function (DEF FN) dispatch
    if (expr.includes('FN') && Object.keys(this.userFunctions).length > 0) {
        const fnRe = /\bFN([A-Z])\s*\(/g;
        let fnMatch;
        while ((fnMatch = fnRe.exec(expr)) !== null) {
            if (isInQuotes(fnMatch.index)) continue;
            const letter = fnMatch[1];
            const def = this.userFunctions[letter];
            if (!def) { this.debugPrint(`Undefined function: FN${letter}`, 'error'); break; }
            const argStart = fnMatch.index + fnMatch[0].length;
            let parenCount = 1, argEnd = argStart;
            for (let i = argStart; i < expr.length; i++) {
                if (expr[i] === '(') parenCount++;
                else if (expr[i] === ')') { parenCount--; if (parenCount === 0) { argEnd = i; break; } }
            }
            if (parenCount !== 0) break;
            const argValue = this._evalNested(expr.substring(argStart, argEnd));
            // Save/restore parameter for local scoping
            const hadParam = this.scalarVariables.hasOwnProperty(def.param);
            const savedValue = this.scalarVariables[def.param];
            this.scalarVariables[def.param] = argValue;
            let result;
            try { result = this.evaluateExpression(def.body); }
            finally {
                if (hadParam) this.scalarVariables[def.param] = savedValue;
                else delete this.scalarVariables[def.param];
            }
            const sv = String(result);
            const replacement = (typeof result === 'number' && result < 0) ? `(${sv})` : sv;
            expr = expr.substring(0, fnMatch.index) + replacement + expr.substring(argEnd + 1);
            quoteMap = this._buildQuoteMap(expr);
            fnRe.lastIndex = 0;
        }
    }

    // Stage 5: Array reference substitution
    if (expr.includes('(') && Object.keys(this.arrayVariables).length > 0) {
        for (const arrayName of Object.keys(this.arrayVariables)) {
            if (!Array.isArray(this.arrayVariables[arrayName])) continue;
            if (!this._arrayPatterns[arrayName]) {
                this._arrayPatterns[arrayName] = new RegExp('\\b' + arrayName.replace('$', '\\$') + '\\(');
            }
            const arrayRe = this._arrayPatterns[arrayName];
            let searchStart = 0;
            while (true) {
                arrayRe.lastIndex = searchStart;
                const m = arrayRe.exec(expr);
                if (!m) break;
                const startIndex = m.index + m[0].length;
                let parenCount = 1, endIndex = startIndex;
                for (let i = startIndex; i < expr.length; i++) {
                    if (expr[i] === '(') parenCount++;
                    else if (expr[i] === ')') { parenCount--; if (parenCount === 0) { endIndex = i; break; } }
                }
                if (parenCount !== 0) break;
                const indexExpr = expr.substring(startIndex, endIndex);
                const index = this._computeArrayLinearIndex(arrayName, indexExpr);
                if (index >= 0 && index < this.arrayVariables[arrayName].length) {
                    let replacement = this.arrayVariables[arrayName][index];
                    if (arrayName.endsWith('$') || typeof replacement === 'string')
                        replacement = `'${String(replacement).replace(/'/g, "\\'")}'`;
                    else if (typeof replacement === 'number' && replacement < 0)
                        replacement = `(${replacement})`;
                    const repStr = String(replacement);
                    expr = expr.substring(0, m.index) + repStr + expr.substring(endIndex + 1);
                    searchStart = m.index + repStr.length;
                } else {
                    // Capture full variable state for debugging
                    const vars = {};
                    for (const k of ['X','Y','R','C','I','DX','DY']) {
                        if (this.scalarVariables.hasOwnProperty(k)) vars[k] = this.scalarVariables[k];
                    }
                    console.error(`BS ERROR: ${arrayName}[${index}], array length=${this.arrayVariables[arrayName].length}, vars=`, vars, `expr="${expr}"`);
                    this._errorBs(arrayName, index);
                    throw new Error(`Array index out of bounds: ${arrayName}[${index}]`);
                }
            }
        }
    }

    // Stage 6: Scalar variable substitution
    const parts = expr.split(this._re.stringSplit);
    const hasAlpha = /[a-zA-Z]/.test(expr);
    if (hasAlpha && Object.keys(this.scalarVariables).length > 0) {
        const varCount = Object.keys(this.scalarVariables).length;
        if (varCount !== this._lastVarCount) {
            this._sortedVarsCache = Object.keys(this.scalarVariables).sort((a, b) => b.length - a.length);
            this._lastVarCount = varCount;
        }
        for (let pi = 0; pi < parts.length; pi += 2) {
            if (!parts[pi].trim()) continue;
            let partQuoteMap = this._buildQuoteMap(parts[pi]);

            for (const varName of this._sortedVarsCache) {
                const value = this.scalarVariables[varName];
                if (!this._varRegexCache[varName]) {
                    let pattern;
                    if (TRS80Simulator.PROTECTED_FUNCTIONS.has(varName.toUpperCase())) {
                        pattern = '\\b' + varName.replace('$', '\\$') + '\\b(?!\\()';
                    } else {
                        pattern = varName.endsWith('$')
                            ? varName.replace('$', '\\$')
                            : '\\b' + varName + '\\b';
                    }
                    this._varRegexCache[varName] = new RegExp(pattern, 'g');
                }
                const varRe = this._varRegexCache[varName];
                varRe.lastIndex = 0;

                const newParts = [];
                let lastEnd = 0;
                let m;
                while ((m = varRe.exec(parts[pi])) !== null) {
                    const s = m.index, e = m.index + m[0].length;
                    if (!(s < partQuoteMap.length && partQuoteMap[s])) {
                        newParts.push(parts[pi].substring(lastEnd, s));
                        if (varName.endsWith('$')) {
                            const safe = String(value).replace(/'/g, "\\'");
                            newParts.push(`'${safe}'`);
                        } else {
                            // Wrap negative numbers in parens to prevent --x issues
                            // e.g. -DY when DY=-1 would become --1 without parens
                            const sv = String(value);
                            newParts.push(sv[0] === '-' ? `(${sv})` : sv);
                        }
                    } else {
                        newParts.push(parts[pi].substring(lastEnd, e));
                    }
                    lastEnd = e;
                }
                newParts.push(parts[pi].substring(lastEnd));
                const newPart = newParts.join('');
                if (newPart !== parts[pi]) {
                    parts[pi] = newPart;
                    partQuoteMap = this._buildQuoteMap(parts[pi]);
                }
            }
        }
    }
    expr = parts.join('');
    this._lastEvalSubstituted = expr;

    // Stage 7: Comparison wrapping for TRS-80 semantics
    expr = this._wrapTrs80Logic(expr);
    this._lastEvalSubstituted = expr;

    // Stage 8: eval()
    try {
        const result = eval(expr);
        return result;
    } catch (e) {
        if (this.debugMode) this.debugPrint(`Evaluation failed: ${e.message}`, 'error');
        return expr.replace(/^['"]|['"]$/g, '');
    }
}

// ------------------------------------------------------------------
//  TRS-80 Comparison & Logic Wrapping
// ------------------------------------------------------------------
_wrapTrs80Logic(expr) {
    for (const [opStr, funcName] of [['>=','_ge'],['<=','_le'],['!=','_ne'],['==','_eq'],['>','_gt'],['<','_lt']]) {
        while (true) {
            const pos = this._findCompOp(expr, opStr);
            if (pos === -1) break;
            const leftStart = this._scanLeftBoundary(expr, pos);
            const rightEnd  = this._scanRightBoundary(expr, pos + opStr.length);
            const left  = expr.substring(leftStart, pos).trim();
            const right = expr.substring(pos + opStr.length, rightEnd).trim();
            expr = expr.substring(0, leftStart) + `${funcName}(${left},${right})` + expr.substring(rightEnd);
        }
    }
    expr = this._wrapNotOps(expr);
    return expr;
}

_findCompOp(expr, opStr) {
    let inDouble = false, inSingle = false;
    const opLen = opStr.length;
    let i = 0;
    while (i <= expr.length - opLen) {
        if (expr[i] === '"' && !inSingle) { inDouble = !inDouble; i++; continue; }
        if (expr[i] === "'" && !inDouble) { inSingle = !inSingle; i++; continue; }
        if (!inDouble && !inSingle && expr.substring(i, i + opLen) === opStr) {
            if (opStr === '>' && i + 1 < expr.length && expr[i + 1] === '=') { i += 2; continue; }
            if (opStr === '<' && i + 1 < expr.length && expr[i + 1] === '=') { i += 2; continue; }
            return i;
        }
        i++;
    }
    return -1;
}

_scanLeftBoundary(expr, opPos) {
    let depth = 0, i = opPos - 1;
    while (i >= 0 && expr[i] === ' ') i--;
    while (i >= 0) {
        const ch = expr[i];
        if (ch === ')') depth++;
        else if (ch === '(') { if (depth > 0) depth--; else return i + 1; }
        else if (ch === "'") { i--; while (i >= 0 && expr[i] !== "'") i--; }
        else if (depth === 0) {
            if (ch === '&' || ch === '|' || ch === ',') return i + 1;
            if (i >= 3 && expr.substring(i - 3, i + 1) === 'not ') return i + 1;
        }
        i--;
    }
    return 0;
}

_scanRightBoundary(expr, opEnd) {
    let depth = 0, i = opEnd;
    while (i < expr.length && expr[i] === ' ') i++;
    while (i < expr.length) {
        const ch = expr[i];
        if (ch === '(') depth++;
        else if (ch === ')') { if (depth > 0) depth--; else return i; }
        else if (ch === "'") { i++; while (i < expr.length && expr[i] !== "'") i++; }
        else if (depth === 0) {
            if (ch === '&' || ch === '|' || ch === ',') return i;
        }
        i++;
    }
    return expr.length;
}

_wrapNotOps(expr) {
    while (true) {
        let inQuote = false, pos = -1;
        for (let i = 0; i < expr.length; i++) {
            if (expr[i] === '"') inQuote = !inQuote;
            else if (!inQuote && expr.substring(i, i + 4) === 'not ') {
                if (i === 0 || !/[a-zA-Z]/.test(expr[i - 1])) { pos = i; break; }
            }
        }
        if (pos === -1) break;
        let opStart = pos + 4;
        while (opStart < expr.length && expr[opStart] === ' ') opStart++;
        let depth = 0, j = opStart;
        if (j < expr.length && expr[j] === '(') {
            depth = 1; j++;
            while (j < expr.length && depth > 0) {
                if (expr[j] === '(') depth++; else if (expr[j] === ')') depth--;
                j++;
            }
        } else {
            while (j < expr.length) {
                const ch = expr[j];
                if (ch === '(') depth++;
                else if (ch === ')') { if (depth > 0) depth--; else break; }
                else if (depth === 0 && (ch === '&' || ch === '|')) break;
                j++;
            }
        }
        const operand = expr.substring(opStart, j);
        expr = expr.substring(0, pos) + `_bnot(${operand})` + expr.substring(j);
    }
    return expr;
}

// ------------------------------------------------------------------
//  Built-in Functions — mirrors _init_builtin_functions
// ------------------------------------------------------------------
_initBuiltinFunctions() {
    this._builtinFunctions = {
        'INT':     (v) => Math.trunc(Number(v)),
        'SIN':     (v) => Math.sin(Number(v)),
        'COS':     (v) => Math.cos(Number(v)),
        'TAN':     (v) => Math.tan(Number(v)),
        'ATN':     (v) => Math.atan(Number(v)),
        'SQR':     (v) => Math.sqrt(Number(v)),
        'LOG':     (v) => Math.log(Number(v)),
        'EXP':     (v) => Math.exp(Number(v)),
        'SGN':     (v) => { const n = Number(v); return n < 0 ? -1 : (n > 0 ? 1 : 0); },
        'ABS':     (v) => Math.abs(Number(v)),
        'FIX':     (v) => Math.trunc(Number(v)),
        'VAL':     (v) => { const s = String(v); const n = parseFloat(s); return isNaN(n) ? 0 : (n === Math.trunc(n) ? Math.trunc(n) : n); },
        'RND':     (v, ie) => this._funcRnd(v),
        'ASC':     (v) => String(v).charCodeAt(0) || 0,
        'PEEK':    (v) => this.peek(Math.trunc(Number(v))),
        'POINT':   (v, ie) => this._funcPoint(ie),
        'LEN':     (v) => String(v).length,
        'STR$':    (v) => this._funcStr(v),
        'CHR$':    (v) => "'" + String.fromCharCode(Math.trunc(Number(v))).replace(/'/g, "\\'") + "'",
        'STRING$': (v, ie) => this._funcString(ie),
        'LEFT$':   (v, ie) => this._funcLeft(ie),
        'RIGHT$':  (v, ie) => this._funcRight(ie),
        'MID$':    (v, ie) => this._funcMid(ie),
        'INSTR':   (v, ie) => this._funcInstr(ie),
    };
}

_funcRnd(v) {
    // RND(0) or RND(1) -> new float 0.0..0.9999 (Midway/STARTREK probabilities)
    // RND(n>1)         -> new integer 1..n       (Snake coordinates)
    const n = Number(v);
    let result;
    if (Math.trunc(n) <= 1) {
        result = Math.random();
    } else {
        result = Math.floor(Math.random() * Math.trunc(n)) + 1;
    }
    this._lastRnd = result;
    return result;
}

_funcStr(v) {
    const num = Number(v);
    let s = (num === Math.trunc(num)) ? String(Math.trunc(num)) : String(num);
    if (num >= 0) s = ' ' + s;
    // Escape any apostrophes so eval() doesn't break (mirrors Python .replace("'","\'"))
    return "'" + s.replace(/'/g, "\\'") + "'";
}

_funcPoint(innerExpr) {
    try {
        const parts = this._splitAllTopLevelCommas(innerExpr);
        if (parts.length < 2) return 0;
        const x = Math.trunc(this._evalNested(parts[0].trim()));
        const y = Math.trunc(this._evalNested(parts[1].trim()));
        return this.getPixel(x - 1, y - 1);
    } catch (e) { return 0; }
}

_funcString(innerExpr) {
    const parts = this._splitAllTopLevelCommas(innerExpr);
    if (parts.length < 2) return "''";
    const count = Math.trunc(this._evalNested(parts[0].trim()));
    let char = this._evalNested(parts[1].trim());
    if (typeof char === 'number') char = String.fromCharCode(char);
    else char = String(char)[0] || '';
    return "'" + char.repeat(count).replace(/'/g, "\\'") + "'";
}

_funcLeft(innerExpr) {
    const parts = this._splitAllTopLevelCommas(innerExpr);
    if (parts.length < 2) return "''";
    const str = String(this._evalNested(parts[0].trim()));
    const len = Math.trunc(this._evalNested(parts[1].trim()));
    return "'" + str.substring(0, len).replace(/'/g, "\\'") + "'";
}

_funcRight(innerExpr) {
    const parts = this._splitAllTopLevelCommas(innerExpr);
    if (parts.length < 2) return "''";
    const str = String(this._evalNested(parts[0].trim()));
    const len = Math.trunc(this._evalNested(parts[1].trim()));
    return "'" + str.slice(-len).replace(/'/g, "\\'") + "'";
}

_funcMid(innerExpr) {
    const parts = this._splitAllTopLevelCommas(innerExpr);
    if (parts.length < 2) return "''";
    const str   = String(this._evalNested(parts[0].trim()));
    const start = Math.trunc(this._evalNested(parts[1].trim())) - 1;
    if (parts.length > 2) {
        const len = Math.trunc(this._evalNested(parts[2].trim()));
        return "'" + str.substring(start, start + len).replace(/'/g, "\\'") + "'";
    }
    return "'" + str.substring(start).replace(/'/g, "\\'") + "'";
}

_funcInstr(innerExpr) {
    const parts = this._splitAllTopLevelCommas(innerExpr);
    let startPos = 1, str, find;
    if (parts.length === 2) {
        str  = String(this._evalNested(parts[0].trim()));
        find = String(this._evalNested(parts[1].trim()));
    } else if (parts.length >= 3) {
        startPos = Math.trunc(this._evalNested(parts[0].trim()));
        str  = String(this._evalNested(parts[1].trim()));
        find = String(this._evalNested(parts[2].trim()));
    } else return 0;
    const idx = str.indexOf(find, startPos - 1);
    return idx === -1 ? 0 : idx + 1;
}

// ------------------------------------------------------------------
//  Memory Model — PEEK / POKE / INKEY$
// ------------------------------------------------------------------
poke(address, value) {
    if (address >= 15360 && address <= 16383) {
        const screenPos = address - 15360;
        const row = Math.trunc(screenPos / COLS);
        const col = screenPos % COLS;
        if (row < ROWS) {
            this.screenContent[row][col] = String.fromCharCode(value);
            this.drawChar(row, col, String.fromCharCode(value));
        }
    }
}

peek(address) {
    if (address === 14400) {
        if (this.lastKeyPressed) {
            const kv = this.lastKeyPressed.charCodeAt(0);
            this.lastKeyPressed = null;
            return kv;
        }
        return 0;
    }
    if (address >= 15360 && address <= 16383) {
        const screenPos = address - 15360;
        const row = Math.trunc(screenPos / COLS);
        const col = screenPos % COLS;
        if (row < ROWS) return this.screenContent[row][col].charCodeAt(0);
    }
    return 0;
}

inkey() {
    const key = this.lastKeyPressed;
    if (key) { this.lastKeyPressed = null; return key; }
    return '';
}

// ------------------------------------------------------------------
//  Graphics — SET / RESET / POINT
// ------------------------------------------------------------------
setPixel(x, y) {
    if (x >= 0 && x < 128 && y >= 0 && y < 48) {
        this.pixelMatrix[y][x] = 1;
        this._pendingGraphics.push(['set', x, y]);
        this.activePixels.add(`${x},${y}`);
        if (this._pendingGraphics.length >= 20) this._flushGraphics();
    }
}

resetPixel(x, y) {
    if (x >= 0 && x < 128 && y >= 0 && y < 48) {
        this.pixelMatrix[y][x] = 0;
        this._pendingGraphics.push(['reset', x, y]);
        this.activePixels.delete(`${x},${y}`);
        if (this._pendingGraphics.length >= 20) this._flushGraphics();
    }
}

_flushGraphics() {
    if (!this._pendingGraphics.length) return;
    const ctx = this.ctx;
    const ps = this.pixelSize;
    for (const [op, x, y] of this._pendingGraphics) {
        ctx.fillStyle = op === 'set' ? '#33ff33' : 'black';
        ctx.fillRect(x * ps, y * ps, ps, ps);
    }
    this._pendingGraphics = [];
}

getPixel(x, y) {
    if (x >= 0 && x < 128 && y >= 0 && y < 48) return this.pixelMatrix[y][x];
    return 0;
}

// ------------------------------------------------------------------
//  File I/O — SAVE / LOAD
// ------------------------------------------------------------------
async saveProgram() {
    const lines = this._sortProgramLines(this.inputArea.value.trim().split('\n'));
    this.inputArea.value = lines.join('\n');
    this.storedProgram = lines;
    const text = lines.join('\n') + '\n';
    const blob = new Blob([text], { type: 'text/plain' });
    const defaultName = 'program.bas';

    if (typeof window.showSaveFilePicker === 'function') {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: defaultName,
                types: [{ description: 'BASIC program', accept: { 'text/plain': ['.bas', '.txt'] } }],
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return;
        } catch (e) {
            if (e && e.name === 'AbortError') return;
        }
    }

    let name = typeof prompt === 'function'
        ? prompt('Save as (filename):', defaultName)
        : defaultName;
    if (name === null) return;
    name = String(name).trim().replace(/^.*[/\\]/, '') || defaultName;
    if (!name.includes('.')) name += '.bas';

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
}

_triggerLoad() {
    document.getElementById('fileInput').click();
}

_handleFileLoad(event) {
    const file = event.target.files[0];
    if (!file) return;
    const autoRun = this._autoRunAfterLoad;
    this._autoRunAfterLoad = false;
    const reader = new FileReader();
    reader.onload = (e) => {
        const content = e.target.result;
        const lines = this._sortProgramLines(content.trim().split('\n'));
        this.inputArea.value = lines.join('\n');
        this.storedProgram = lines;
        this.printToScreen(`LOADED: ${file.name}`);
        // If LOAD was called from within a program, auto-RUN the loaded file
        if (autoRun) {
            setTimeout(() => this.runProgram(), 50);
        } else {
            this.enableImmediateMode();
        }
        // Re-focus the canvas so keyboard input works immediately
        setTimeout(() => this._focusForInput(), 100);
    };
    reader.readAsText(file);
    event.target.value = '';
}

// ------------------------------------------------------------------
//  Debug & Error
// ------------------------------------------------------------------
toggleDebug() {
    this.debugMode = !this.debugMode;
    const btn = document.getElementById('btnDebug');
    if (this.debugMode) {
        btn.textContent = 'Debug: OFF';
        this.debugPanel.style.display = 'block';
    } else {
        btn.textContent = 'Debug: ON';
        this.debugPanel.style.display = 'none';
        // Match Python: closing debug hides the variables panel too
        if (this.variablesWindowOpen) {
            this.variablesWindowOpen = false;
            document.getElementById('btnVariables').textContent = 'Variables: ON';
            this.variablesPanel.style.display = 'none';
        }
    }
}

toggleVariables() {
    this.variablesWindowOpen = !this.variablesWindowOpen;
    const btn = document.getElementById('btnVariables');
    if (this.variablesWindowOpen) {
        btn.textContent = 'Variables: OFF';
        this.variablesPanel.style.display = 'block';
        this._updateVariablesContent();
    } else {
        btn.textContent = 'Variables: ON';
        this.variablesPanel.style.display = 'none';
    }
}

_formatStateValue(value) {
    if (typeof value === 'string') return JSON.stringify(value);
    if (typeof value === 'number' && value === Math.trunc(value)) return String(Math.trunc(value));
    return String(value);
}

_summarizeStateArray(name, value) {
    if (!Array.isArray(value)) return `${name} = ${this._formatStateValue(value)}`;
    const active = name.endsWith('$')
        ? value.map((v, i) => (v !== '' ? [i, v] : null)).filter(Boolean)
        : value.map((v, i) => (v !== 0 ? [i, v] : null)).filter(Boolean);
    if (!active.length) return `${name}(${value.length - 1}) = [all default]`;
    const preview = active.slice(0, 8).map(([i, v]) => `[${i}]=${this._formatStateValue(v)}`).join(', ');
    const extra = active.length > 8 ? `, ... (${active.length} used)` : '';
    return `${name}(${value.length - 1}) = ${preview}${extra}`;
}

_updateVariablesContent() {
    if (!this.variablesWindowOpen) return;
    const lines = [];
    lines.push('STATUS');
    lines.push(`Program Running: ${this.programRunning}`);
    lines.push(`Program Paused: ${this.programPaused}`);
    lines.push(`Stepping Mode: ${this.stepping}`);
    lines.push(`Last Key Pressed: ${this.lastKeyPressed}`);
    lines.push(`Data Pointer: ${this.dataPointer}`);
    lines.push('');
    lines.push('CURRENT LINE');
    if (this.currentLineIndex >= 0 && this.currentLineIndex < this._lineNumbers.length) {
        lines.push(`Line Number: ${this._lineNumbers[this.currentLineIndex]}`);
        lines.push(`Command: ${this._lineCommands[this.currentLineIndex]}`);
        lines.push('');
    } else {
        lines.push('Program execution completed or not started');
        lines.push('');
    }
    lines.push('SCALAR VARIABLES');
    const scalarKeys = Object.keys(this.scalarVariables).sort();
    if (scalarKeys.length) {
        for (const v of scalarKeys) {
            lines.push(`${v} = ${this._formatStateValue(this.scalarVariables[v])}`);
        }
    } else {
        lines.push('None');
    }
    lines.push('');
    lines.push('ARRAYS');
    const arrayKeys = Object.keys(this.arrayVariables).sort();
    if (arrayKeys.length) {
        for (const v of arrayKeys) {
            lines.push(this._summarizeStateArray(v, this.arrayVariables[v]));
        }
    } else {
        lines.push('None');
    }
    lines.push('');
    lines.push('ACTIVE FOR LOOPS');
    const forKeys = Object.keys(this.forLoops);
    if (forKeys.length) {
        for (const v of forKeys) {
            const loop = this.forLoops[v];
            lines.push(`${v}: current=${loop.current} start=${loop.start} end=${loop.end} step=${loop.step} next=${loop.nextLineNumber}`);
        }
    } else {
        lines.push('None');
    }
    lines.push('');
    lines.push('GOSUB STACK');
    if (this.gosubStack.length) {
        const stackLines = this.gosubStack.map(entry => {
            let returnIndex = entry;
            if (typeof entry === 'object' && entry !== null && 'idx' in entry) returnIndex = entry.idx;
            if (returnIndex >= 0 && returnIndex < this._lineNumbers.length) {
                return String(this._lineNumbers[returnIndex]);
            }
            return String(returnIndex);
        });
        lines.push(stackLines.join(' -> '));
    } else {
        lines.push('Empty');
    }
    this.variablesText.value = lines.join('\n');
    this.variablesText.scrollTop = 0;
}

debugPrint(message, level = 'info') {
    if (!this.debugMode && level === 'info') return;
    const ln = this._getCurrentLineNumber();
    const prefix = `[Line ${ln} | Step ${this.currentLineIndex + 1}]`;
    const tag = level === 'error' ? ' ERROR:' : (level === 'warning' ? ' WARNING:' : '');
    this.debugText.value += `${prefix}${tag} ${message}\n`;
    this.debugText.scrollTop = this.debugText.scrollHeight;
}

_getCurrentLineNumber() {
    if (this.currentLineIndex < this._lineNumbers.length) {
        const ln = this._lineNumbers[this.currentLineIndex];
        return ln === Math.trunc(ln) ? String(Math.trunc(ln)) : String(ln);
    }
    return '?';
}

_errorSn(detail = '') { const ln = this._getCurrentLineNumber(); const msg = `?SN ERROR IN ${ln}`; this.printToScreen(msg); this.debugPrint(detail ? `${msg} - ${detail}` : msg, 'error'); }
_errorFc(detail = '') { const ln = this._getCurrentLineNumber(); const msg = `?FC ERROR IN ${ln}`; this.printToScreen(msg); this.debugPrint(detail ? `${msg} - ${detail}` : msg, 'error'); }
_errorUl(lineNum)     { const ln = this._getCurrentLineNumber(); const msg = `?UL ERROR IN ${ln}`; this.printToScreen(msg); this.debugPrint(`${msg} - Line ${lineNum} not found`, 'error'); }
_errorBs(arr, idx) {
    const ln = this._getCurrentLineNumber();
    const msg = `?BS ERROR IN ${ln}`;
    const arrLen = this.arrayVariables[arr] ? this.arrayVariables[arr].length : '?';
    this.printToScreen(msg);
    this.debugPrint(`${msg} - ${arr}(${idx}) out of bounds (array size ${arrLen})`, 'error');
    // Show relevant variable values for debugging
    const dbgVars = ['X','Y','R','C','I','DX','DY'].filter(v => this.scalarVariables.hasOwnProperty(v)).map(v => `${v}=${this.scalarVariables[v]}`).join(', ');
    if (dbgVars) this.debugPrint(`Variables: ${dbgVars}`, 'error');
    this.programRunning = false;
}
_errorOd()            { const ln = this._getCurrentLineNumber(); const msg = `?OD ERROR IN ${ln}`; this.printToScreen(msg); this.debugPrint(msg, 'error'); }
_errorNf(v)           { const ln = this._getCurrentLineNumber(); const msg = `?NF ERROR IN ${ln}`; this.printToScreen(msg); this.debugPrint(v ? `${msg} - Variable ${v}` : msg, 'error'); }
_errorRg()            { const ln = this._getCurrentLineNumber(); const msg = `?RG ERROR IN ${ln}`; this.printToScreen(msg); this.debugPrint(msg, 'error'); }

// ------------------------------------------------------------------
//  Utilities
// ------------------------------------------------------------------
findLineIndex(lineNumber) {
    const nums = this._lineNumbers;
    let left = 0, right = nums.length - 1;
    while (left <= right) {
        const mid = (left + right) >> 1;
        if (nums[mid] === lineNumber) return mid;
        else if (nums[mid] < lineNumber) left = mid + 1;
        else right = mid - 1;
    }
    return -1;
}

_sortProgramLines(lines) {
    return lines.filter(l => l.trim()).map(l => l.trimEnd())
        .sort((a, b) => {
            const na = parseFloat(a), nb = parseFloat(b);
            if (!isNaN(na) && !isNaN(nb)) return na - nb;
            if (!isNaN(na)) return -1;
            if (!isNaN(nb)) return 1;
            return 0;
        });
}

// -- UI helpers --
breakProgram() {
    if (this.programRunning) {
        if (this.currentLineIndex < this._lineNumbers.length) {
            this.printToScreen(`BREAK IN ${this._getCurrentLineNumber()}`);
        } else {
            this.printToScreen('BREAK');
        }
        this.programRunning = false;
        this.programPaused  = false;
        this.waitingForInput = false;
        this.inputVariables = null;
        this._setStopBtn(false);
        this.enableImmediateMode();
        this._focusForInput();
    }
    if (this.variablesWindowOpen) this._updateVariablesContent();
}

stopProgram() {
    if (this.programRunning) {
        if (this.programPaused) {
            // If we were waiting for tape, cancel that wait
            if (this.waitingForTape) {
                this.waitingForTape = false;
                this._setTapeButtonWaiting(false);
                // Advance past the INPUT#-1 line so we don't retry it
                this.currentLineIndex++;
            }
            this.programPaused = false;
            this._setStopBtn(true, 'STOP');
            this.disableImmediateMode();
            this.executeNextLine();
        } else {
            this.programPaused = true;
            this._setStopBtn(true, 'CONT');
            this.enableImmediateMode();
        }
    } else {
        this._setStopBtn(false);
        this.programPaused = false;
        this.enableImmediateMode();
    }
    if (this.variablesWindowOpen) this._updateVariablesContent();
}

stepProgram() {
    this.stepping = true;
    if (!this.programRunning) this.runProgram();
    this.programPaused = false;
    this.executeNextLine();
    this.programPaused = true;
    this._setStopBtn(true, 'CONT');
    this.stepping = false;
    if (this.variablesWindowOpen) this._updateVariablesContent();
}

listProgram() {
    const lines = this._sortProgramLines(this.inputArea.value.trim().split('\n'));
    this.storedProgram = lines;
    this.inputArea.value = lines.join('\n');
    if (lines.length) this.printToScreen(lines.join('\n'));
}

_clearVariablesBtn() {
    if (this.programRunning) {
        this.programRunning = false;
        this.programPaused  = false;
        this._setStopBtn(false);
    }
    this.waitingForInput = false;
    this.inputVariables = null;
    this.scalarVariables = {};
    this.arrayVariables  = {};
    this.arrayDimensions = {};
    this.userFunctions   = {};
    this.forLoops = {};
    this.gosubStack = [];
    this.dataPointer = 0;
    this.dataValues  = [];
    this.lastKeyPressed = null;
    this.printToScreen('VARIABLES CLEARED');
    if (this.variablesWindowOpen) this._updateVariablesContent();
}

_newBtn() {
    if (this.programRunning) {
        this.programRunning = false;
        this.programPaused  = false;
        this._setStopBtn(false);
    }
    this.newProgram();
    this.storedProgram = [];
    this.inputArea.value = '';
    this.enableImmediateMode();
}

_setStopBtn(enabled, text = 'STOP') {
    const btn = document.getElementById('btnStop');
    const step = document.getElementById('btnStep');
    btn.disabled = !enabled;
    btn.textContent = text;
    step.disabled = !enabled;
}

copyScreen() {
    const text = this.screenContent.map(row => row.join('')).join('\n');
    navigator.clipboard.writeText(text.trimEnd()).catch(() => {});
}

_listPreprocessed() {
    if (this.sortedProgram.length) {
        this.debugText.value += this.sortedProgram.join('\n') + '\n';
        this.debugText.scrollTop = this.debugText.scrollHeight;
    }
}

_deleteLines(rangeSpec) {
    const lines = this._sortProgramLines(this.inputArea.value.trim().split('\n'));
    try {
        if (rangeSpec.includes('-')) {
            const [s, e] = rangeSpec.split('-').map(Number);
            this.storedProgram = lines.filter(l => { const n = parseFloat(l); return n < s || n > e; });
        } else {
            const target = parseFloat(rangeSpec);
            this.storedProgram = lines.filter(l => parseFloat(l) !== target);
        }
        this.inputArea.value = this.storedProgram.join('\n');
        this.printToScreen('DELETED');
    } catch (e) { this.printToScreen('?SYNTAX ERROR'); }
}

} // end class TRS80Simulator

// ===================================================================
//  Boot
// ===================================================================
const sim = new TRS80Simulator();
</script>
